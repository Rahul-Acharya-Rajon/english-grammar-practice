<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Connector Master - Final Print Fix</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #c94646;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* Responsive Grid for Mobile */
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            body {
                padding: 10px;
            }
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-size: 14px;
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .gap-input {
            display: inline-block;
            min-width: 130px;
            border: none;
            border-bottom: 2px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            outline: none;
            margin: 0 4px;
            padding: 2px;
        }

        .letter-label {
            font-weight: bold;
            color: var(--p);
            margin-right: 2px;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 3px;
            font-size: 0.9em;
        }

        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--p);
            color: white;
            padding: 8px 14px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        /* --- ADVANCED PRINT FIXES --- */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            @page {
                margin: 1cm;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                padding: 0 !important;
            }

            .container {
                max-width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                background: var(--card-bg) !important;
            }

            .no-print {
                display: none !important;
            }

            .quiz-card {
                border: 1px solid var(--border) !important;
                margin-bottom: 15px !important;
                padding: 15px !important;
                page-break-inside: avoid;
                background: var(--card-bg) !important;
            }

            /* ইনপুটের কালার প্রিন্টে ফোর্স করা হয়েছে */
            .gap-input {
                border-bottom: 2px solid var(--p) !important;
                background: var(--input-bg) !important;
                min-width: 100px !important;
                font-size: 12pt !important;
                color: inherit !important;
                /* স্ক্রিনে যে কালার আছে তাই নিবে */
            }

            h2 {
                font-size: 18pt !important;
                margin-bottom: 10px !important;
                color: var(--p) !important;
            }

            .letter-label {
                color: var(--p) !important;
            }

            .feedback-area {
                display: block !important;
                background: var(--bg) !important;
                border: 1px solid var(--border) !important;
                color: var(--text-main) !important;
                margin-top: 8px !important;
                padding: 8px !important;
                font-size: 10pt !important;
            }

            .ans-tag {
                border: 1px solid var(--border) !important;
                color: var(--text-main) !important;
                background: var(--bg) !important;
                font-size: 9pt !important;
                padding: 2px 5px !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color:var(--p);">HSC Sentence Connectors Practice</h2>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <textarea id="q-input" placeholder="Paste Questions..."></textarea>
                <textarea id="a-input" placeholder="Paste Answers..."></textarea>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Generate Practice
                Sheet</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Check Answers</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Print / Save PDF</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }
        function cleanString(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').trim().replace(/[.;:]/g, '');
        }
        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Fill both boxes!");
            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            quizData = qBlocks.map((text, idx) => {
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";
                const pattern = /\(([a-n])\)([\s\S]*?)(?=\([a-n]\)|$)/g;
                let match;
                while ((match = pattern.exec(rawAns)) !== null) {
                    ansMap[match[1]] = match[2].trim().replace(/;$/, '');
                }
                let html = text.replace(/\(([a-n])\)\s*[_—.-]+/g, (m, letter) => {
                    return `<span class="letter-label">(${letter})</span><input type="text" class="gap-input" data-letter="${letter}" data-qid="${idx}" autocomplete="off">`;
                });
                return { html, answers: ansMap };
            });
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            document.getElementById('quiz-container').innerHTML = quizData.map((item, i) => `
                <div class="quiz-card">
                    <h3>Set ${i + 1}</h3>
                    <div style="white-space: pre-wrap; font-size: 16px;">${item.html}</div>
                    <div id="fb-${i}" class="feedback-area"></div>
                </div>
            `).join('');
        }
        function checkAnswers() {
            quizData.forEach((item, qIdx) => {
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let keyHTML = "";
                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanString(input.value);
                    const official = item.answers[letter] || "";
                    const possible = official.split(/[/;]|\sor\s/).map(o => cleanString(o));
                    const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                    // এখানে কালার সেট করা হচ্ছে যা প্রিন্টেও কাজ করবে
                    input.style.setProperty('color', isCorrect ? 'var(--s)' : 'var(--d)', 'important');

                    if (isCorrect) score++;
                    keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
                });
                const fb = document.getElementById(`fb-${qIdx}`);
                fb.style.display = "block";
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br><b>Answers:</b> ${keyHTML}`;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
