<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Practice Sheet</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #bd3c3c;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            .setup-grid {
                grid-template-columns: 1fr !important;
            }

            textarea {
                height: 250px;
                font-size: 14px;
            }

            .gap-input {
                min-width: 100px;
                width: 80px;
                font-size: 14px;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }

            h2 {
                font-size: 1.4rem;
            }
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .gap-input {
            display: inline-block;
            min-width: 150px;
            border: none;
            border-bottom: 2px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            outline: none;
            margin: 0 4px;
            padding: 2px;
        }

        .letter-label {
            font-weight: bold;
            color: var(--p);
            margin-right: 4px;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.1);
            border-left: 5px solid var(--s);
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.1);
            border-left: 5px solid var(--d);
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 3px;
            font-size: 0.9em;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        .pagination-info {
            font-weight: bold;
            color: var(--p);
            margin: 15px 0;
            text-align: center;
            font-size: 1.1rem;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-sub);
        }

        /* --- ENHANCED PRINT OPTIMIZATION --- */
        @media print {
            @page {
                margin: 0.5cm;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .no-print,
            .theme-toggle,
            .btn {
                display: none !important;
            }

            .container {
                max-width: 100% !important;
                width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                background: transparent !important;
            }

            .quiz-card {
                border: 1px solid var(--border) !important;
                margin-bottom: 12px !important;
                padding: 12px !important;
                page-break-inside: avoid;
                background: var(--card-bg) !important;
                border-radius: 8px !important;
            }

            .gap-input {
                border-bottom: 1px solid var(--p) !important;
                background: transparent !important;
                min-width: 100px !important;
                font-size: 14px !important;
                color: inherit !important;
            }

            .gap-input[style*="color: var(--s)"] {
                color: var(--s) !important;
            }

            .gap-input[style*="color: var(--d)"] {
                color: var(--d) !important;
            }

            .feedback-area {
                display: block !important;
                background: var(--bg) !important;
                border: 1px solid var(--border) !important;
                margin-top: 8px !important;
                padding: 8px !important;
                font-size: 13px !important;
            }

            .correct-box {
                border-left: 5px solid var(--s) !important;
                background: rgba(22, 163, 74, 0.1) !important;
            }

            .wrong-box {
                border-left: 5px solid var(--d) !important;
                background: rgba(220, 38, 38, 0.1) !important;
            }

            h2 {
                margin: 0 0 10px 0 !important;
                font-size: 1.2rem !important;
                color: var(--p) !important;
            }

            h3 {
                margin: 0 0 5px 0 !important;
                font-size: 1rem !important;
            }

            .ans-tag {
                border: 1px solid var(--border) !important;
                background: var(--bg) !important;
                color: var(--text-main) !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color:var(--p);">HSC Modifier Practice Sheet Generator</h2>
        <p style="text-align: center; color: var(--text-sub);">Modify these sentences according to directions.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions:</label>
                    <textarea id="q-input" placeholder="Paste Questions (1. Read the following...)"></textarea>
                </div>
                <div>
                    <label>2. Paste Answers:</label>
                    <textarea id="a-input" placeholder="Paste Answers (1. (a) answer; (b) answer;)"></textarea>
                </div>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Build Practice
                Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="pagination-info no-print" id="page-info"></div>
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Submit</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Export PDF</button>
                <button id="export-word-btn" class="btn" style="background:#2b6cb0;" onclick="exportToWord()">Export to
                    Word</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
                <div id="pagination" style="margin-top: 10px;">
                    <button class="btn" style="background:#3b82f6" onclick="prevPage()" id="prev-btn">Previous</button>
                    <button class="btn" style="background:#3b82f6" onclick="nextPage()" id="next-btn">Next</button>
                </div>
            </div>
            <div class="pagination-info no-print" id="score-info" style="margin-top:20px; font-size:1.1rem;"></div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        const quizzesPerPage = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }

        function exportToWord() {
            // ১. কুইজ কন্টেইনার এবং স্কোর সেকশন কপি করা
            const quizContent = document.getElementById('quiz-container').cloneNode(true);
            const scoreInfo = document.getElementById('score-info').cloneNode(true);

            // ২. প্রতিটি এক্সারসাইজ হেডার স্টাইল করা (Exercise No)
            const headers = quizContent.querySelectorAll('h3');
            headers.forEach(h => {
                h.style.backgroundColor = '#2563eb';
                h.style.color = '#ffffff';
                h.style.padding = '10px';
                h.style.borderRadius = '5px';
                h.style.marginBottom = '15px';
            });

            // ৩. ইনপুট বক্সগুলোকে কালারফুল টেক্সটে রূপান্তর করা
            const inputs = quizContent.querySelectorAll('.gap-input');
            inputs.forEach(input => {
                const userValue = input.value.trim();
                const span = document.createElement('span');
                span.style.fontWeight = 'bold';

                // কালার লজিক: ওয়েব ডকুমেন্টের কালার ভেরিয়েবল অনুযায়ী
                if (input.style.color === "var(--s)" || input.style.color === "rgb(22, 163, 74)") {
                    span.style.color = '#16a34a'; // Correct Green
                } else if (input.style.color === "var(--d)" || input.style.color === "rgb(189, 60, 60)") {
                    span.style.color = '#bd3c3c'; // Wrong Red
                }

                span.innerText = userValue ? ` ${userValue} ` : " __________ ";
                input.parentNode.replaceChild(span, input);
            });

            // ৪. ফিডব্যাক এরিয়া (সঠিক উত্তরগুলো) সুন্দর করে দেখানো
            const feedbackAreas = quizContent.querySelectorAll('.feedback-area');
            feedbackAreas.forEach(area => {
                if (window.getComputedStyle(area).display !== 'none') {
                    area.style.display = 'block';
                    area.style.border = '1px solid #cbd5e1';
                    area.style.backgroundColor = '#f8fafc';
                    area.style.padding = '10px';
                    area.style.marginTop = '10px';
                }
            });

            // ৫. স্কোর কার্ড স্টাইল করা
            scoreInfo.style.marginTop = '30px';
            scoreInfo.style.padding = '15px';
            scoreInfo.style.border = '2px solid #2563eb';
            scoreInfo.style.backgroundColor = '#eff6ff';
            scoreInfo.style.fontSize = '18px';
            scoreInfo.style.textAlign = 'center';

            // ৬. ওয়ার্ড ফাইলের পূর্ণাঙ্গ ফরম্যাট তৈরি
            const header = "<html xmlns:o='urn:schemas-microsoft-com:office:office' " +
                "xmlns:w='urn:schemas-microsoft-com:office:word' " +
                "xmlns='http://www.w3.org/TR/REC-html40'>" +
                "<head><meta charset='utf-8'><style>body{font-family:'Segoe UI',Arial;}</style></head><body>";
            const footer = "</body></html>";

            // কুইজ এবং স্কোর একসাথে যোগ করা
            const finalHTML = header + quizContent.innerHTML + scoreInfo.innerHTML + footer;

            const source = 'data:application/vnd.ms-word;charset=utf-8,' + encodeURIComponent(finalHTML);
            const fileDownload = document.createElement("a");
            document.body.appendChild(fileDownload);
            fileDownload.href = source;
            fileDownload.download = 'Modifier_Result_Sheet.doc';
            fileDownload.click();
            document.body.removeChild(fileDownload);
        }

        function loadDemo() {

        function cleanString(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').trim().replace(/[.;:]/g, '');
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Fill both boxes!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((text, idx) => {
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";
                const pattern = /\(([a-j])\)([\s\S]*?)(?=\([a-j]\)|$)/g;
                let match;
                while ((match = pattern.exec(rawAns)) !== null) {
                    let letter = match[1];
                    let val = match[2].replace(/[\r\n]+/g, ' ').replace(/;\s*$/, '').trim();
                    ansMap[letter] = val;
                }
                let html = text.replace(/\(([a-j])\)\s*_{2,}/g, (m, letter) => {
                    return `<span class="letter-label">(${letter})</span><input type="text" class="gap-input" data-letter="${letter}" data-qid="${idx}" autocomplete="off">`;
                });
                return { html, answers: ansMap };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderQuizzes();
            updatePaginationButtons();
            updateScoreDisplay();
        }

        function renderQuizzes() {
            const start = currentPage * quizzesPerPage;
            const end = start + quizzesPerPage;
            const pageQuizzes = quizData.slice(start, end);

            document.getElementById('quiz-container').innerHTML = pageQuizzes.map((item, i) => {
                const globalIdx = start + i;
                return `
                    <div class="quiz-card" id="card-${globalIdx}">
                        <h3 style="margin-top:0">Exercise ${globalIdx + 1}</h3>
                        <div style="white-space: pre-wrap;">${item.html}</div>
                        
                        <!-- প্রতিটি সেটের জন্য আলাদা চেক বাটন -->
                        <div style="margin-top: 15px;" class="no-print">
                            <button class="btn" style="background:var(--p); padding: 8px 15px; font-size: 13px;" 
                                onclick="checkSingleSet(${globalIdx})">Check Answer</button>
                        </div>

                        <div id="fb-${globalIdx}" class="feedback-area"></div>
                    </div>
                `;
            }).join('');

            document.getElementById('page-info').textContent = `Page ${currentPage + 1} of ${Math.ceil(quizData.length / quizzesPerPage)}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkSingleSet(qIdx) {
            let score = 0;
            const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
            let keyHTML = "";

            if (inputs.length === 0) return;

            inputs.forEach(input => {
                const letter = input.dataset.letter;
                const userVal = cleanString(input.value);
                const official = quizData[qIdx].answers[letter] || "";
                const possible = official.split(/[/;]/).map(o => cleanString(o));
                const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                input.style.color = isCorrect ? "var(--s)" : "var(--d)";
                if (isCorrect) score++;
                keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
            });

            const fb = document.getElementById(`fb-${qIdx}`);
            fb.style.display = "block";
            fb.className = `feedback-area ${score === inputs.length && score > 0 ? 'correct-box' : 'wrong-box'}`;
            fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br><br><b>Answers:</b><br>${keyHTML}`;

            // স্কোর আপডেট করার জন্য
            updateScoreDisplay();
        }

        function checkAnswers() {
            const start = currentPage * quizzesPerPage;
            const end = start + quizzesPerPage;

            for (let qIdx = start; qIdx < end && qIdx < quizData.length; qIdx++) {
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let keyHTML = "";
                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanString(input.value);
                    const official = quizData[qIdx].answers[letter] || "";
                    const possible = official.split(/[/;]/).map(o => cleanString(o));
                    const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                    input.style.color = isCorrect ? "var(--s)" : "var(--d)";
                    if (isCorrect) score++;
                    keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
                });

                const fb = document.getElementById(`fb-${qIdx}`);
                fb.style.display = "block";
                fb.className = `feedback-area ${score === inputs.length && score > 0 ? 'correct-box' : 'wrong-box'}`;
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br><br><b>Answers:</b><br>${keyHTML}`;
            }

            updateScoreDisplay();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        let totalCorrect = 0;
        let totalBlanks = 0;
        function updateScoreDisplay() {

            quizData.forEach((item, qIdx) => {
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let pageCorrect = 0;
                inputs.forEach(input => {
                    if (input.style.color === "var(--s)") pageCorrect++;
                });
                totalCorrect += pageCorrect;
                totalBlanks += inputs.length;
            });

            const currentStart = currentPage * quizzesPerPage;
            const currentEnd = Math.min(currentStart + quizzesPerPage, quizData.length);
            let pageCorrect = 0;
            let pageTotal = 0;

            for (let i = currentStart; i < currentEnd; i++) {
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${i}"]`);
                pageTotal += inputs.length;
                inputs.forEach(input => {
                    if (input.style.color === "var(--s)") pageCorrect++;
                });
            }

            document.getElementById('score-info').innerHTML = `
                <b>Page Score: ${pageCorrect} / ${pageTotal}</b><br>
                <b>Total Score: ${totalCorrect} / ${totalBlanks}</b>
            `;
        }

        function nextPage() {
            if ((currentPage + 1) * quizzesPerPage < quizData.length) {
                currentPage++;
                renderQuizzes();
                updatePaginationButtons();
                updateScoreDisplay();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderQuizzes();
                updatePaginationButtons();
                updateScoreDisplay();
            }
        }

        function updatePaginationButtons() {
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = (currentPage + 1) * quizzesPerPage >= quizData.length;
        }
    </script>
