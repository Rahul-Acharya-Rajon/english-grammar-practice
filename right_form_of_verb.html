<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Form of Verbs Practice Sheet</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #db3d3d;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            .setup-grid {
                grid-template-columns: 1fr !important;
            }

            textarea {
                height: 250px;
            }

            .gap-input {
                min-width: 100px;
                width: 80px;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .gap-input {
            display: inline-block;
            min-width: 130px;
            border: none;
            border-bottom: 2px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            outline: none;
            margin: 0 4px;
            padding: 2px;
            border-radius: 4px 4px 0 0;
        }

        .letter-label {
            font-weight: bold;
            color: var(--p);
            margin-right: 2px;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.1);
            border-left: 6px solid var(--s);
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.1);
            border-left: 6px solid var(--d);
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 3px;
            font-size: 0.9em;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        #page-total-score {
            font-size: 1.1em;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            background: rgba(59, 130, 246, 0.1);
            border-left: 5px solid #3b82f6;
            text-align: center;
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Hide interactive elements */
            .no-print,
            .pagination-controls,
            .theme-toggle,
            .btn {
                display: none !important;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                margin: 0;
                padding: 10mm;
            }

            .container,
            .quiz-card {
                background: var(--card-bg) !important;
                box-shadow: none !important;
                border: 1px solid var(--border) !important;
                margin-bottom: 40px !important;
                page-break-inside: avoid;
                padding: 15px;
            }

            h2,
            h3 {
                color: var(--p) !important;
            }

            .gap-input {
                background: var(--input-bg) !important;
                color: var(--text-main) !important;
                border-bottom: 3px solid var(--p) !important;
            }

            /* Make correct/wrong more visible in print */
            .feedback-area {
                display: block !important;
                border: 1px solid var(--border) !important;
            }

            .correct-box {
                background-color: rgba(22, 163, 74, 0.12) !important;
                border-left: 8px solid var(--s) !important;
                color: var(--s) !important;
            }

            .wrong-box {
                background-color: rgba(220, 38, 38, 0.12) !important;
                border-left: 8px solid var(--d) !important;
                color: var(--d) !important;
            }

            .ans-tag {
                background: var(--bg) !important;
                border: 1px solid var(--border) !important;
                color: var(--text-main) !important;
            }

            /* Ensure colored inputs stay visible */
            input[style*="color: var(--s)"] {
                color: var(--s) !important;
                border-bottom-color: var(--s) !important;
            }

            input[style*="color: var(--d)"] {
                color: var(--d) !important;
                border-bottom-color: var(--d) !important;
            }

            /* Better spacing for print */
            .quiz-card {
                margin-bottom: 2cm !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color:var(--p);">HSC Right Form of Verbs Practice Sheet Generator</h2>
        <p style="text-align: center; color: var(--text-sub);">Fill up these blanks with appropriate form of verbs. You
            have given verbs on the gaps.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">1. Paste All Questions:</label>
                    <textarea id="q-input"
                        placeholder="Paste Questions (e.g. 1. In this world truth (a) — (reign)...)"></textarea>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">2. Paste All Answers:</label>
                    <textarea id="a-input" placeholder="Paste Answers (e.g. 1. (a) reigns (b) speaking...)"></textarea>
                </div>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Build Practice
                Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="page-total-score" class="no-print hidden">Page Total Score: — / —</div>
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Submit</button>
                <button class="btn" style="background:#9333ea" onclick="preparePrintAndPrint()">Export PDF</button>
                <button id="export-word-btn" class="btn" style="background:#2b6cb0;" onclick="exportToWord()">Export to
                    Word</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
                <div id="pagination" style="margin-top: 10px;">
                    <button class="btn" style="background:#3b82f6" onclick="prevPage()">Previous</button>
                    <span id="page-info"></span>
                    <button class="btn" style="background:#3b82f6" onclick="nextPage()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 1;
        const perPage = 10;
        let totalPages = 0;

        function exportToWord() {
            if (quizData.length === 0) {
                alert("কোনো প্রশ্ন লোড করা হয়নি।");
                return;
            }

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const currentItems = quizData.slice(start, end);

            if (currentItems.length === 0) {
                alert("এই পেজে কোনো exercise নেই।");
                return;
            }

            let content = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:w="urn:schemas-microsoft-com:office:word"
              xmlns="http://www.w3.org/TR/REC-html40">
        <head>
            <meta charset="utf-8">
            <title>HSC Right Form of Verbs - Page ${currentPage}</title>
            <style>
                body { 
                    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; 
                    line-height: 1.5; 
                    color: #1e293b; 
                    font-size: 11pt; /* Word-e font size control korar jonno fix */
                    margin: 2cm 1.8cm;
                }
                h1 { color: #2563eb; text-align: center; font-size: 16pt; margin-bottom: 10px; }
                h2 { color: #2563eb; margin: 1.5em 0 0.5em; font-size: 13pt; border-bottom: 1px solid #cbd5e1; }
                .question-set { margin-bottom: 20px; padding: 15px; border: 1px solid #cbd5e1; border-radius: 6px; background: #f9fafb; }
                .feedback { margin-top: 10px; padding: 10px; border-left: 6px solid; border-radius: 4px; background: rgba(0,0,0,0.03); }
                .correct-box { border-left-color: #16a34a; color: #166534; }
                .wrong-box { border-left-color: #db3d3d; color: #991b1b; }
                .ans-tag { background: #f1f5f9; padding: 4px 8px; margin: 0 6px 4px 0; border: 1px solid #cbd5e1; border-radius: 4px; display: inline-block; font-size: 10pt; }
                .page-info { text-align: center; font-size: 11pt; color: #475569; margin-bottom: 20px; font-weight: bold; }
            </style>
        </head>
        <body>
            <h1>HSC Right Form of Verbs Practice Sheet</h1>
            <div class="page-info">Page ${currentPage} of ${totalPages} – Exported on ${new Date().toLocaleString('en-GB')}</div>
    `;

            currentItems.forEach((item, localIdx) => {
                const globalIdx = start + localIdx;
                let processedHtml = item.html;

                // FIXED REGEX: Extra '>' somossa dur korar jonno .*?> add kora hoyeche
                processedHtml = processedHtml.replace(
                    /<input type="text" class="gap-input" data-letter="([a-n])" data-qid="[^"]*" autocomplete="off"( placeholder="[^"]*")?.*?>/g,
                    (match, letter, placeholder) => {
                        const inputEl = document.querySelector(`.gap-input[data-qid="${globalIdx}"][data-letter="${letter}"]`);

                        // FIXED: Extra (a) dur korar jonno label bad dewa hoyeche
                        if (!inputEl) return ` __________ `;

                        let value = inputEl.value.trim() || '__________';
                        let colorHex = '#000000';

                        const style = window.getComputedStyle(inputEl);
                        const borderColor = style.borderColor || style.borderBottomColor;

                        if (borderColor.includes('22, 163, 74') || borderColor === 'rgb(22, 163, 74)') {
                            colorHex = '#16a34a';
                        } else if (borderColor.includes('219, 61, 61') || borderColor === 'rgb(219, 61, 61)') {
                            colorHex = '#db3d3d';
                        }

                        // Placeholder handle kora (optional logic from your original code)
                        if (placeholder && value === '__________') {
                            value = placeholder.replace(/ placeholder="([^"]*)"/, '$1').trim() || value;
                        }

                        return `<span style="color:${colorHex}; text-decoration:underline; font-weight:600;">${value}</span>`;
                    }
                );

                content += `
            <div class="question-set">
                <h2>Exercise ${globalIdx + 1}</h2>
                <div style="white-space: pre-wrap;">${processedHtml}</div>
        `;

                const fb = document.getElementById(`fb-${globalIdx}`);
                if (fb && fb.style.display !== 'none') {
                    let fbClass = fb.className.includes('correct-box') ? 'correct-box' : 'wrong-box';
                    let fbHTML = fb.innerHTML.replace(/<b>/g, '<strong>').replace(/class="ans-tag"/g, 'class="ans-tag"');
                    content += `<div class="feedback ${fbClass}">${fbHTML}</div>`;
                }

                content += `</div>`;
            });

            content += `</body></html>`;

            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `HSC_Verbs_Page_${currentPage}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme")
                ? document.documentElement.removeAttribute("data-theme")
                : document.documentElement.setAttribute("data-theme", "dark");
        }

        function loadDemo() {

            const demoQuestions = `1. Read the following text and fill in the gaps with correct form of verbs as per subject and context.

        function cleanString(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').trim().replace(/[.;:]/g, '');
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Please fill both boxes!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((text, idx) => {
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";

                const pattern = /\(([a-n])\)([\s\S]*?)(?=\([a-n]\)|$)/g;
                let match;
                while ((match = pattern.exec(rawAns)) !== null) {
                    ansMap[match[1]] = match[2].trim().replace(/;$/, '');
                }

                let html = text.replace(/\(([a-n])\)\s*[-—._\s]+\(([a-zA-Z\s]+)\)/g, (m, letter, verb) => {
                    return `<span class="letter-label">(${letter})</span><input type="text" class="gap-input" data-letter="${letter}" data-qid="${idx}" autocomplete="off" placeholder="(${verb})">`;
                });

                html = html.replace(/\(([a-n])\)\s*[-—._\s]+/g, (m, letter) => {
                    if (m.includes('<input')) return m;
                    return `<span class="letter-label">(${letter})</span><input type="text" class="gap-input" data-letter="${letter}" data-qid="${idx}" autocomplete="off">`;
                });

                return { html, answers: ansMap };
            });

            totalPages = Math.ceil(quizData.length / perPage);

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            document.getElementById('quiz-container').innerHTML = quizData.map((item, i) => `
                <div class="quiz-card" data-page="${Math.floor(i / perPage) + 1}" data-qid="${i}">
                    <h3>Exercise ${i + 1}</h3>
                    <div style="white-space: pre-wrap; text-align: justify;">${item.html}</div>
                    
                    <!-- প্রতিটি সেটের জন্য আলাদা বাটন -->
                    <div style="margin-top: 15px;" class="no-print">
                        <button class="btn" style="background:var(--p); padding: 8px 15px; font-size: 13px;" 
                            onclick="checkSingleExercise(${i})">Check Answer</button>
                    </div>

                    <div id="fb-${i}" class="feedback-area"></div>
                </div>
            `).join('');

            showPage(currentPage);
        }

        function checkSingleExercise(qIdx) {
            let score = 0;
            const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
            let keyHTML = "";

            inputs.forEach(input => {
                const letter = input.dataset.letter;
                const userVal = cleanString(input.value);
                const official = quizData[qIdx].answers[letter] || "";

                const possible = official.split(/[/;]|\sor\s/).map(o => cleanString(o));
                const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                input.style.color = isCorrect ? "var(--s)" : "var(--d)";
                input.style.borderColor = isCorrect ? "var(--s)" : "var(--d)";
                if (isCorrect) score++;
                keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
            });

            const fb = document.getElementById(`fb-${qIdx}`);
            fb.style.display = "block";
            fb.className = `feedback-area ${score === inputs.length && score > 0 ? 'correct-box' : 'wrong-box'}`;
            fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br><br><b>Correct Answers:</b><br>${keyHTML}`;

            // নির্দিষ্ট কার্ডে স্ক্রল করার জন্য (ঐচ্ছিক)
            document.querySelector(`.quiz-card[data-qid="${qIdx}"]`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function showPage(page) {
            currentPage = page;
            const cards = document.querySelectorAll('.quiz-card');
            cards.forEach(card => {
                card.style.display = (parseInt(card.dataset.page) === currentPage) ? 'block' : 'none';
                // print এর জন্য data attribute সেট করা হবে পরে
                card.removeAttribute('data-print-visible');
            });

            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('page-total-score').classList.add('hidden');
            document.getElementById('page-total-score').innerHTML = `Page Total Score: — / —`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function preparePrintAndPrint() {
            // শুধু বর্তমান পেজের কার্ডগুলোকে print-visible করা
            document.querySelectorAll('.quiz-card').forEach(card => {
                if (parseInt(card.dataset.page) === currentPage) {
                    card.setAttribute('data-print-visible', 'true');
                } else {
                    card.removeAttribute('data-print-visible');
                }
            });

            // একটু পরে প্রিন্ট ডায়ালগ ওপেন করা (CSS কাজ করার জন্য)
            setTimeout(() => {
                window.print();
            }, 100);
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                showPage(currentPage);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                showPage(currentPage);
            }
        }

        function checkAnswers() {
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            let pageTotalCorrect = 0;
            let pageTotalBlanks = 0;

            for (let qIdx = start; qIdx < end && qIdx < quizData.length; qIdx++) {
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let keyHTML = "";

                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanString(input.value);
                    const official = quizData[qIdx].answers[letter] || "";

                    const possible = official.split(/[/;]|\sor\s/).map(o => cleanString(o));
                    const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                    input.style.color = isCorrect ? "var(--s)" : "var(--d)";
                    input.style.borderColor = isCorrect ? "var(--s)" : "var(--d)";
                    if (isCorrect) score++;
                    keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
                });

                const fb = document.getElementById(`fb-${qIdx}`);
                fb.style.display = "block";
                fb.className = `feedback-area ${score === inputs.length && score > 0 ? 'correct-box' : 'wrong-box'}`;
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br><br><b>Correct Answers:</b><br>${keyHTML}`;

                pageTotalCorrect += score;
                pageTotalBlanks += inputs.length;
            }

            const scoreEl = document.getElementById('page-total-score');
            scoreEl.innerHTML = `Page Total Score: <span style="color:var(--s)">${pageTotalCorrect}</span> / ${pageTotalBlanks}`;
            scoreEl.classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
