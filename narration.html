<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Narration Practice - Direct to Indirect</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #b91c1c;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --hl: #fef08a;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            transition: background 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            textarea,
            .user-input-box {
                height: 180px;
                font-size: 14px;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            font-size: 15px;
            box-sizing: border-box;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .q-display {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-style: italic;
            border-left: 4px solid var(--p);
            white-space: pre-wrap;
            color: #1e293b;
        }

        [data-theme="dark"] .q-display {
            background: #334155;
            color: #f1f5f9;
        }

        .user-input-box {
            width: 100%;
            height: 220px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 16px;
            line-height: 1.7;
            resize: vertical;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 6px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 16px;
            padding: 16px;
            border-radius: 10px;
            display: none;
        }

        .diff-view {
            background: var(--card-bg);
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 8px;
            color: var(--text-main);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .correct-line {
            color: var(--s);
            font-weight: 500;
            display: block;
            border-left: 4px solid var(--s);
            padding-left: 10px;
            margin: 6px 0;
        }

        .wrong-line {
            color: var(--d);
            font-weight: 500;
            display: block;
            border-left: 4px solid var(--d);
            padding-left: 10px;
            margin: 6px 0;
        }

        .actual-hint {
            color: var(--p);
            font-style: italic;
            font-size: 0.9em;
            display: block;
            margin: 4px 0 10px 20px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        .pagination {
            text-align: center;
            margin: 24px 0;
        }

        .score-display {
            margin: 20px 0;
            padding: 14px;
            background: rgba(22, 163, 74, 0.12);
            border-radius: 8px;
            font-weight: bold;
            color: var(--s);
            text-align: center;
            border: 1px solid var(--s);
        }

        @media print {
            @page {
                margin: 0.6cm;
            }

            body {
                background: white !important;
                color: black !important;
                padding: 0 !important;
            }

            .no-print,
            .theme-toggle,
            .user-input-box,
            .btn,
            h2 {
                display: none !important;
            }

            .container {
                box-shadow: none;
                background: white;
                padding: 0;
                margin: 0;
                width: 100%;
            }

            .quiz-card {
                page-break-inside: avoid;
                border: 1px solid #000;
                margin-bottom: 12px;
                padding: 12px;
            }

            .q-display {
                background: #f8f8f8 !important;
                border-left: 4px solid #2563eb;
            }

            .feedback-area {
                display: block !important;
                padding: 0;
            }

            .diff-view {
                border: none;
                background: transparent;
                padding: 0;
            }
        }
    </style>
</head>

<body>

    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓</div>

    <div class="container">
        <h2 style="text-align:center; color:var(--p);" class="no-print">Narration Change Practice<br>(Direct → Indirect
            Speech)</h2>

        <div id="setup-view" class="no-print">
            <p>Paste questions (direct speech) and model answers (indirect speech) below — one item per block, starting
                with number or just new line separation.</p>
            <div class="setup-grid">
                <textarea id="q-input"
                    placeholder="Questions (direct speech passages)&#10;e.g.&#10;1. A hawker said, “Will you buy any paper?...”&#10;2. My friend said to me, ..."></textarea>
                <textarea id="a-input"
                    placeholder="Model answers (indirect speech)&#10;e.g.&#10;1. A hawker asked Sushmita if she would buy...&#10;2. My friend asked me why I was sitting..."></textarea>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Start Practice</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Check Answers</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Print</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
            <div id="pagination" class="pagination no-print"></div>
            <div id="score-display" class="score-display hidden"></div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        const itemsPerPage = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme")
                ? document.documentElement.removeAttribute("data-theme")
                : document.documentElement.setAttribute("data-theme", "dark");
        }

        function clean(str) {
            return str.toLowerCase()
                .replace(/[.,!?;:()“”‘’]/g, "")
                .replace(/\s+/g, " ")
                .trim();
        }

        function splitBySentence(text) {
            return text.split(/(?<=[.!?])\s+(?=[A-Z])/).map(s => s.trim()).filter(s => s.length > 0);
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Please fill both text areas!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((qText, idx) => {
                let cleanQ = qText.replace(/^\d+\.\s*/, "").trim();
                let cleanA = (aBlocks[idx] || "").replace(/^\d+\.\s*/, "").trim();
                return { original: cleanQ, model: cleanA };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderPage(currentPage);
        }

        function renderPage(page) {
            const start = page * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = quizData.slice(start, end);

            document.getElementById('quiz-container').innerHTML = pageData.map((item, i) => `
            <div class="quiz-card">
                <h3>Question ${start + i + 1}</h3>
                <div class="q-display"><strong>Direct:</strong><br>${item.original}</div>
                <textarea class="user-input-box no-print" data-idx="${start + i}" placeholder="Write your indirect narration here..."></textarea>
                <div id="fb-${start + i}" class="feedback-area"></div>
            </div>
        `).join('');

            renderPagination();
            document.getElementById('score-display').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const totalPages = Math.ceil(quizData.length / itemsPerPage);
            let html = '';
            if (currentPage > 0) {
                html += `<button class="btn" style="background:var(--p)" onclick="changePage(${currentPage - 1})">Previous</button>`;
            }
            html += ` Page ${currentPage + 1} of ${totalPages} `;
            if (currentPage < totalPages - 1) {
                html += `<button class="btn" style="background:var(--p)" onclick="changePage(${currentPage + 1})">Next</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderPage(currentPage);
        }

        function checkAnswers() {
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            let totalCorrect = 0;
            let totalSentences = 0;

            for (let idx = start; idx < end && idx < quizData.length; idx++) {
                const item = quizData[idx];
                const userText = document.querySelector(`.user-input-box[data-idx="${idx}"]`)?.value?.trim() || "";
                if (!userText) continue;

                const userLines = splitBySentence(userText);
                const modelLines = splitBySentence(item.model);

                const fb = document.getElementById(`fb-${idx}`);
                let report = "<h4>Comparison:</h4><div class='diff-view'>";

                const max = Math.max(userLines.length, modelLines.length);
                let correctCount = 0;

                for (let j = 0; j < max; j++) {
                    let u = userLines[j] || "";
                    let m = modelLines[j] || "";

                    if (m && u && clean(u) === clean(m)) {
                        report += `<span class="correct-line">✓ ${u}</span>`;
                        correctCount++;
                    } else if (m) {
                        report += `<span class="wrong-line">✗ ${u || "[Empty line]"}</span>`;
                        report += `<span class="actual-hint">→ Model: ${m}</span>`;
                    }
                }

                totalCorrect += correctCount;
                totalSentences += modelLines.length;

                report += "</div>";
                fb.innerHTML = report;
                fb.style.display = "block";
            }

            const score = totalSentences > 0 ? Math.round((totalCorrect / totalSentences) * 100) : 0;
            const display = document.getElementById('score-display');
            display.innerHTML = `Page Score: ${score}% <br>(${totalCorrect} correct out of ${totalSentences} sentences)`;
            display.classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
