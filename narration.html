<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Narration Practice - Direct to Indirect</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #b91c1c;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --hl: #fef08a;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            transition: background 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-sub);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            textarea,
            .user-input-box {
                height: 180px;
                font-size: 14px;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            font-size: 15px;
            box-sizing: border-box;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .q-display {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-style: italic;
            border-left: 4px solid var(--p);
            white-space: pre-wrap;
            color: #1e293b;
        }

        [data-theme="dark"] .q-display {
            background: #334155;
            color: #f1f5f9;
        }

        .user-input-box {
            width: 100%;
            height: 220px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 16px;
            line-height: 1.7;
            resize: vertical;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 6px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 16px;
            padding: 16px;
            border-radius: 10px;
            display: none;
        }

        .diff-view {
            background: var(--card-bg);
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 8px;
            color: var(--text-main);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .correct-line {
            color: var(--s);
            font-weight: 500;
            display: block;
            border-left: 4px solid var(--s);
            padding-left: 10px;
            margin: 6px 0;
        }

        .wrong-line {
            color: var(--d);
            font-weight: 500;
            display: block;
            border-left: 4px solid var(--d);
            padding-left: 10px;
            margin: 6px 0;
        }

        .actual-hint {
            color: var(--p);
            font-style: italic;
            font-size: 0.9em;
            display: block;
            margin: 4px 0 10px 20px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        .pagination {
            text-align: center;
            margin: 24px 0;
        }

        .score-display {
            margin: 20px 0;
            padding: 14px;
            background: rgba(22, 163, 74, 0.12);
            border-radius: 8px;
            font-weight: bold;
            color: var(--s);
            text-align: center;
            border: 1px solid var(--s);
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Hide interactive elements */
            .no-print,
            .pagination-controls,
            .theme-toggle,
            .btn {
                display: none !important;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                margin: 0;
                padding: 10mm;
            }

            .container,
            .quiz-card {
                background: var(--card-bg) !important;
                box-shadow: none !important;
                border: 1px solid var(--border) !important;
                margin-bottom: 40px !important;
                page-break-inside: avoid;
                padding: 15px;
            }

            h2,
            h3 {
                color: var(--p) !important;
            }

            .gap-input {
                background: var(--input-bg) !important;
                color: var(--text-main) !important;
                border-bottom: 3px solid var(--p) !important;
            }

            /* Make correct/wrong more visible in print */
            .feedback-area {
                display: block !important;
                border: 1px solid var(--border) !important;
            }

            .correct-box {
                background-color: rgba(22, 163, 74, 0.12) !important;
                border-left: 8px solid var(--s) !important;
                color: var(--s) !important;
            }

            .wrong-box {
                background-color: rgba(220, 38, 38, 0.12) !important;
                border-left: 8px solid var(--d) !important;
                color: var(--d) !important;
            }

            .ans-tag {
                background: var(--bg) !important;
                border: 1px solid var(--border) !important;
                color: var(--text-main) !important;
            }

            /* Ensure colored inputs stay visible */
            input[style*="color: var(--s)"] {
                color: var(--s) !important;
                border-bottom-color: var(--s) !important;
            }

            input[style*="color: var(--d)"] {
                color: var(--d) !important;
                border-bottom-color: var(--d) !important;
            }

            /* Better spacing for print */
            .quiz-card {
                margin-bottom: 2cm !important;
            }
        }
    </style>
</head>

<body>

    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>

    <div class="container">
        <h2 style="text-align:center; color:var(--p);" class="no-print">HSC Narration Practice Sheet
            Generator<br>(Direct → Indirect
            Speech)</h2>
        <p style="text-align: center; color: var(--text-sub);">Change the form of sentences according to directions.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions:</label>
                    <textarea id="q-input"
                        placeholder="Questions (direct speech passages)&#10;e.g.&#10;1. A hawker said, “Will you buy any paper?...”&#10;2. My friend said to me, ..."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers:</label>
                    <textarea id="a-input"
                        placeholder="Model answers (indirect speech)&#10;e.g.&#10;1. A hawker asked Sushmita if she would buy...&#10;2. My friend asked me why I was sitting..."></textarea>
                </div>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Build Practice
                Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Submit</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Export PDF</button>
                <button class="btn" style="background:#0ea5e9; color:white;" onclick="exportToWord()">Export to
                    Word</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
            <div id="pagination" class="pagination no-print"></div>
            <div id="score-display" class="score-display hidden"></div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        const itemsPerPage = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme")
                ? document.documentElement.removeAttribute("data-theme")
                : document.documentElement.setAttribute("data-theme", "dark");
        }

        function exportToWord() {
            if (quizData.length === 0) {
                alert("কোনো প্রশ্ন লোড করা হয়নি।");
                return;
            }

            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = quizData.slice(start, end);

            if (currentItems.length === 0) {
                alert("এই পেজে কোনো প্রশ্ন নেই।");
                return;
            }

            let content = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
    <meta charset="utf-8">
    <title>HSC Narration Practice - Page ${currentPage + 1}</title>
    <!--[if gte mso 9]>
    <xml>
        <w:WordDocument>
            <w:View>Print</w:View>
            <w:Zoom>100</w:Zoom>
        </w:WordDocument>
    </xml>
    <![endif]-->
    <style>
        body { 
            font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; 
            line-height: 1.7; 
            color: #1e293b; 
            font-size: 11.5pt; 
        }
        h1 { 
            color: #2563eb; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            margin-bottom: 0.8em; 
        }
        h2 { 
            color: #2563eb; 
            margin: 1.4em 0 0.6em; 
            font-size: 14pt; 
        }
        .question-block { 
            margin-bottom: 1.8em; 
            padding: 1em; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            background: #f9fafb; 
        }
        .direct-speech {
            font-style: italic;
            color: #334155;
            margin: 0.6em 0;
            padding-left: 1em;
            border-left: 4px solid #2563eb;
        }
        .user-answer {
            margin: 0.8em 0 0.4em;
            font-weight: bold;
        }
        .correct { 
            color: #16a34a !important; 
        }
        .wrong { 
            color: #dc2626 !important; 
        }
        .model-answer {
            margin-top: 1em;
            padding: 0.8em;
            background: rgba(22,163,74,0.08);
            border-left: 5px solid #16a34a;
            border-radius: 4px;
        }
        .feedback {
            margin-top: 1.2em;
            padding: 0.9em;
            border-left: 5px solid;
            border-radius: 4px;
            background: rgba(0,0,0,0.03);
        }
        .correct-box { 
            border-left-color: #16a34a; 
            color: #166534; 
        }
        .wrong-box { 
            border-left-color: #dc2626; 
            color: #991b1b; 
        }
        .page-info { 
            text-align: center; 
            font-size: 12pt; 
            color: #475569; 
            margin: 1em 0 1.5em; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <h1>HSC Narration Practice Sheet</h1>
    <div class="page-info">Page ${currentPage + 1} of ${Math.ceil(quizData.length / itemsPerPage)} – Exported on ${new Date().toLocaleString('en-GB')}</div>
`;

            currentItems.forEach((item, localIdx) => {
                const globalIdx = start + localIdx;

                // প্রশ্নের টেক্সট (direct speech)
                const directText = item.original.replace(/\n/g, '<br>');

                // ইউজারের লেখা উত্তর
                const userTextarea = document.querySelector(`.user-input-box[data-idx="${globalIdx}"]`);
                const userAnswer = userTextarea ? userTextarea.value.trim() : "[কোনো উত্তর লেখা হয়নি]";

                // ফিডব্যাক এরিয়া (যদি চেক করা হয়ে থাকে)
                const feedbackEl = document.getElementById(`fb-${globalIdx}`);
                let feedbackHTML = "";
                if (feedbackEl && feedbackEl.style.display !== 'none') {
                    feedbackHTML = feedbackEl.innerHTML
                        .replace(/class="correct-line"/g, 'class="correct"')
                        .replace(/class="wrong-line"/g, 'class="wrong"')
                        .replace(/class="actual-hint"/g, 'style="color:#2563eb; font-style:italic; margin-left:1.2em;"');
                }

                content += `
        <div class="question-block">
            <h2>Question ${globalIdx + 1}</h2>
            
            <div class="direct-speech">
                <strong>Direct:</strong><br>${directText}
            </div>
            
            <div class="user-answer">
                <strong>Your Indirect Narration:</strong><br>
                ${userAnswer.replace(/\n/g, '<br>') || '[খালি]'}
            </div>
`;

                if (feedbackHTML) {
                    let fbClass = feedbackEl.className.includes('correct') ? 'correct-box' : 'wrong-box';
                    content += `
            <div class="feedback ${fbClass}">
                <strong>Feedback / Model Comparison:</strong><br>
                ${feedbackHTML}
            </div>
`;
                } else {
                    // যদি ফিডব্যাক না দেখানো হয়, তাহলে মডেল উত্তর দেখানো যেতে পারে
                    content += `
            <div class="model-answer">
                <strong>Model Answer (Reference):</strong><br>
                ${item.model.replace(/\n/g, '<br>')}
            </div>
`;
                }

                content += `</div>`;
            });

            content += `</body></html>`;

            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `HSC_Narration_Page_${currentPage + 1}_${new Date().toISOString().slice(0, 10)}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function loadDemo() {

had stayed, taking care of animals. He
added that he had been the last one to leave
the town of San Carlos.
`;

            document.getElementById("q-input").value = demoQuestions;
            document.getElementById("a-input").value = demoAnswers;
        }

        function clean(str) {
            return str.toLowerCase()
                .replace(/[.,!?;:()“”‘’]/g, "")
                .replace(/\s+/g, " ")
                .trim();
        }

        function splitBySentence(text) {
            return text.split(/(?<=[.!?])\s+(?=[A-Z])/).map(s => s.trim()).filter(s => s.length > 0);
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Please fill both text areas!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((qText, idx) => {
                let cleanQ = qText.replace(/^\d+\.\s*/, "").trim();
                let cleanA = (aBlocks[idx] || "").replace(/^\d+\.\s*/, "").trim();
                return { original: cleanQ, model: cleanA };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderPage(currentPage);
        }

        function renderPage(page) {
            const start = page * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = quizData.slice(start, end);

            document.getElementById('quiz-container').innerHTML = pageData.map((item, i) => `
            <div class="quiz-card">
                <h3>Question ${start + i + 1}</h3>
                <div class="q-display"><strong>Direct:</strong><br>${item.original}</div>
                <textarea class="user-input-box no-print" data-idx="${start + i}" placeholder="Write your indirect narration here..."></textarea>
                <div id="fb-${start + i}" class="feedback-area"></div>
            </div>
        `).join('');

            renderPagination();
            document.getElementById('score-display').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const totalPages = Math.ceil(quizData.length / itemsPerPage);
            let html = '';
            if (currentPage > 0) {
                html += `<button class="btn" style="background:var(--p)" onclick="changePage(${currentPage - 1})">Previous</button>`;
            }
            html += ` Page ${currentPage + 1} of ${totalPages} `;
            if (currentPage < totalPages - 1) {
                html += `<button class="btn" style="background:var(--p)" onclick="changePage(${currentPage + 1})">Next</button>`;
            }
            document.getElementById('pagination').innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderPage(currentPage);
        }

        function checkAnswers() {
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            let totalCorrect = 0;
            let totalSentences = 0;

            for (let idx = start; idx < end && idx < quizData.length; idx++) {
                const item = quizData[idx];
                const userText = document.querySelector(`.user-input-box[data-idx="${idx}"]`)?.value?.trim() || "";
                if (!userText) continue;

                const userLines = splitBySentence(userText);
                const modelLines = splitBySentence(item.model);

                const fb = document.getElementById(`fb-${idx}`);
                let report = "<h4>Comparison:</h4><div class='diff-view'>";

                const max = Math.max(userLines.length, modelLines.length);
                let correctCount = 0;

                for (let j = 0; j < max; j++) {
                    let u = userLines[j] || "";
                    let m = modelLines[j] || "";

                    if (m && u && clean(u) === clean(m)) {
                        report += `<span class="correct-line">✓ ${u}</span>`;
                        correctCount++;
                    } else if (m) {
                        report += `<span class="wrong-line">✗ ${u || "[Empty line]"}</span>`;
                        report += `<span class="actual-hint">→ Model: ${m}</span>`;
                    }
                }

                totalCorrect += correctCount;
                totalSentences += modelLines.length;

                report += "</div>";
                fb.innerHTML = report;
                fb.style.display = "block";
            }

            const score = totalSentences > 0 ? Math.round((totalCorrect / totalSentences) * 100) : 0;
            const display = document.getElementById('score-display');
            display.innerHTML = `Page Score: ${score}% <br>(${totalCorrect} correct out of ${totalSentences} sentences)`;
            display.classList.remove('hidden');

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
