            overflow: hidden;
        }

        .card:hover {

            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .icon-box {
            font-size: 3rem;
            margin-bottom: 20px;
            background: #eff6ff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card h2 {
            margin: 10px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .card p {
            color: var(--text-sub);
            font-size: 1rem;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-main-row {
            display: grid;
            grid-template-columns: 1fr;
            margin-bottom: 5px;
        }

        .btn-copy-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 15px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .btn-exam {
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
        }

        .btn-exam:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-copy-q {
            background-color: #f1f5f9;
            color: #1e293b;
            border: 1px solid #cbd5e1;
        }

        .btn-copy-a {
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .btn-copy-q:hover {
            background-color: #e2e8f0;
        }

        .btn-copy-a:hover {
            background-color: #d1fae5;
        }

        footer {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-sub);
            font-size: 0.95rem;
            background-color: #e2e8f0;
            margin-top: 50px;
        }

        #toast {
            visibility: hidden;
            min-width: 280px;
            background-color: #1e293b;
            color: #fff;
            text-align: center;
            border-radius: 12px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

        // --- RENDER CARDS ---
        const grid = document.getElementById('examGrid');
        examData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="icon-box">${item.icon}</div>
                <h2>${item.title}</h2>
                <p>${item.desc}</p>
                <div class="button-stack">
                    <div class="btn-main-row">
                        <a href="${item.link}" class="btn btn-exam">Start Exam</a>
                    </div>
                    <div class="btn-copy-row">
                        <button class="btn btn-copy-q" onclick="copyText('${item.id}', 'question')">Copy Ques.</button>
                        <button class="btn btn-copy-a" onclick="copyText('${item.id}', 'answer')">Copy Ans.</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // --- COPY LOGIC ---
        function copyText(itemId, type) {
            const item = examData.find(d => d.id === itemId);
            const text = type === 'question' ? item.question : item.answer;

            navigator.clipboard.writeText(text).then(() => {
                showToast(`${item.title} ${type.charAt(0).toUpperCase() + type.slice(1)} Copied!`);
            });
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg + " ✅";
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }
    </script>
