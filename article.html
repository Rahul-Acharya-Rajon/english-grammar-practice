<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Practice Master - Pro HSC Tool</title>
    <style>
        :root {
            /* Light Mode Colors */
            --p: #2563eb;
            --s: #16a34a;
            --d: #dc2626;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --text-sub: #475569;
            --input-bg: #fffbeb;
            --border: #cbd5e1;
        }

        /* Dark Mode Colors - Fixed Visibility */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --input-bg: #334155;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            transition: all 0.3s ease;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            padding: 20px;
            /* Reduced for mobile */
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        /* Responsive Setup Grid */
        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .btn-submit,
            .btn-export,
            .btn-reset {
                width: 100% !important;
                margin: 5px 0;
            }

            h2 {
                font-size: 22px !important;
            }
        }

        h2 {
            text-align: center;
            color: var(--p);
            font-size: 28px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-sub);
        }

        textarea {
            width: 100%;
            height: 300px;
            /* Adjusted height */
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            margin: 10px 5px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-start {
            background: var(--p);
            width: 100%;
        }

        .btn-submit {
            background: var(--s);
            width: 250px;
        }

        .btn-export {
            background: #9333ea;
            display: none;
            width: 250px;
        }

        .btn-reset {
            background: #64748b;
            width: 150px;
        }

        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--p);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 35px;
            border-radius: 15px;
            line-height: 2.8;
            background: var(--card-bg);
            position: relative;
            transition: transform 0.2s;
            overflow-x: auto;
            /* Prevent overflow on small screens */
        }

        .gap-input {
            width: 80px;
            border: none;
            border-bottom: 3px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            /* Ensures visibility in Dark Mode */
            font-weight: bold;
            font-size: 17px;
            outline: none;
            margin: 0 5px;
            border-radius: 5px 5px 0 0;
        }

        /* Fix for dark mode input readability */
        [data-theme="dark"] .gap-input {
            background: #2d3748;
            color: #ffffff !important;
        }

        .gap-input:focus {
            border-bottom-color: var(--s);
            background: #e2e8f0;
        }

        [data-theme="dark"] .gap-input:focus {
            background: #4a5568;
        }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
            line-height: 2;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.15);
            border-left: 8px solid var(--s);
            color: var(--s);
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.15);
            border-left: 8px solid var(--d);
            color: var(--d);
        }

        .hidden {
            display: none;
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 5px;
            margin: 2px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        /* Export/Print Detailed CSS */
        @media print {

            body,
            .container,
            .quiz-card {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-scheme: light dark !important;
            }

            .no-print,
            .btn,
            .theme-toggle,
            label {
                display: none !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
            }

            .quiz-card {
                page-break-inside: avoid;
                border: 1px solid var(--border) !important;
                margin-bottom: 30px !important;
            }

            .feedback-area {
                display: block !important;
                border: 1px solid #ddd !important;
            }
        }
    </style>
</head>

<body>

    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>

    <div class="container">
        <h2>HSC Article Mastery</h2>
        <p style="text-align: center; color: var(--text-sub);">Fill up these blanks with appropriate articles. For no
            article, keep blank.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions:</label>
                    <textarea id="q-input" placeholder="Example: 1. Article (a) ___ parliament house..."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers:</label>
                    <textarea id="a-input" placeholder="Example: 1. (a) The; (b) an; (c) a; ..."></textarea>
                </div>
            </div>
            <button class="btn btn-start" onclick="processData()">Build Practice Sheet</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="summary-stat" style="text-align:center; margin-bottom:30px; font-size:24px; font-weight:bold;">
            </div>

            <div id="quiz-container"></div>

            <div style="text-align:center;" class="no-print">
                <button class="btn btn-submit" onclick="runEvaluation()">Evaluate My Answers</button>
                <button id="export-btn" class="btn btn-export" onclick="window.print()">Export Progress Report
                    (PDF)</button>
                <button class="btn btn-reset" onclick="location.reload()">New Session</button>
            </div>
        </div>
    </div>

    <script>
        let examData = [];

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            if (current === "dark") {
                document.documentElement.removeAttribute("data-theme");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        }

        function cleanVal(val) {
            if (!val) return "";
            return val.toLowerCase()
                .replace(/[()×:.|—_;\-\t\n]/g, '')
                .replace('cross', 'x')
                .replace(/\s/g, '')
                .trim();
        }

        function processData() {
            const qRaw = document.getElementById('q-input').value;
            const aRaw = document.getElementById('a-input').value;

            if (!qRaw || !aRaw) {
                alert("Please paste both Questions and Answers correctly.");
                return;
            }

            const qBlocks = qRaw.split(/\d+\.\s+Article/i).filter(b => b.trim().length > 15);
            const aBlocks = aRaw.split(/\n\s*\d+\.\s*\n|\n\s*\d+\.\s+/).filter(b => b.trim().length > 0);

            examData = qBlocks.map((text, index) => {
                let html = text.trim().replace(/\(([a-j])\)\s*[_—|-]+/g, (match, letter) => {
                    return `<b>(${letter})</b> <input type="text" class="gap-input" data-qid="${index}" data-letter="${letter}" autocomplete="off">`;
                });

                let ansStr = aBlocks[index] || "";
                let ansMap = {};
                let matches = [...ansStr.matchAll(/\(([a-j])\)\s*([^;(.\n]+)/g)];

                matches.forEach(m => {
                    ansMap[m[1]] = m[2].trim().replace(/[:;.]/g, '').trim();
                });

                return { html, answers: ansMap, originalKey: ansStr };
            });

            renderExam();
        }

        function renderExam() {
            const container = document.getElementById('quiz-container');
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');

            container.innerHTML = examData.map((item, i) => `
                <div class="quiz-card">
                    <h3 style="color:var(--p); margin-top:0;">Question Set ${i + 1}</h3>
                    <div class="content-body">${item.html}</div>
                    <div id="feedback-${i}" class="feedback-area"></div>
                </div>
            `).join('');
        }

        function runEvaluation() {
            let totalMarks = 0;
            let obtainedMarks = 0;

            examData.forEach((item, qIdx) => {
                let setCorrect = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let keyList = [];

                inputs.forEach(input => {
                    totalMarks++;
                    let letter = input.getAttribute('data-letter');
                    let userAns = cleanVal(input.value);
                    let correctAnsRaw = item.answers[letter] || "x";

                    let options = correctAnsRaw.split(/[\/\s]+/).map(o => cleanVal(o));

                    if (options.includes(userAns) || (userAns === 'x' && options.includes('x'))) {
                        input.style.color = "var(--s)";
                        input.style.borderBottomColor = "var(--s)";
                        setCorrect++;
                        obtainedMarks++;
                    } else {
                        input.style.color = "var(--d)";
                        input.style.borderBottomColor = "var(--d)";
                    }
                    keyList.push(`<span class="ans-tag">(${letter}) ${correctAnsRaw}</span>`);
                });

                const fb = document.getElementById(`feedback-${qIdx}`);
                fb.style.display = "block";
                fb.className = `feedback-area ${setCorrect === inputs.length ? 'correct-box' : 'wrong-box'}`;
                fb.innerHTML = `<strong>Set Accuracy: ${setCorrect} / ${inputs.length}</strong><br>
                                <div style="margin-top:10px;"><b>Answer Key:</b> ${keyList.join(' ')}</div>`;
            });

            const percentage = Math.round((obtainedMarks / totalMarks) * 100) || 0;
            document.getElementById('summary-stat').innerHTML =
                `Final Result: ${obtainedMarks} / ${totalMarks} (${percentage}%)`;

            document.getElementById('export-btn').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
