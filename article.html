<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Practice Sheet</title>
    <style>
        :root {
            /* Light Mode Colors */
            --p: #2563eb;
            --s: #16a34a;
            --d: #dc2626;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --text-sub: #475569;
            --input-bg: #fffbeb;
            --border: #cbd5e1;
        }

        /* Dark Mode Colors */
        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --input-bg: #334155;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            transition: all 0.3s ease;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .btn-submit,
            .btn-export,
            .btn-reset,
            .btn-word {
                width: 100% !important;
                margin: 5px 0;
            }

            h2 {
                font-size: 22px !important;
            }
        }

        h2 {
            text-align: center;
            color: var(--p);
            font-size: 28px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-sub);
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            resize: vertical;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            margin: 10px 5px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-start {
            background: var(--p);
            width: 100%;
        }

        .btn-submit {
            background: var(--s);
            width: 250px;
        }

        .btn-export {
            background: #9333ea;
            /* display: none; */
            width: 250px;
        }

        .btn-word {
            background: #2b6cb0;
            /* display: none; */
            width: 250px;
        }

        .btn-reset {
            background: #64748b;
            width: 150px;
        }

        .pagination-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-nav {
            background: #475569;
            padding: 10px 20px;
        }

        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--p);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 35px;
            border-radius: 15px;
            line-height: 2.8;
            background: var(--card-bg);
            position: relative;
            transition: transform 0.2s;
            overflow-x: auto;
        }

        .gap-input {
            width: 80px;
            border: none;
            border-bottom: 3px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: bold;
            font-size: 17px;
            outline: none;
            margin: 0 5px;
            border-radius: 5px 5px 0 0;
        }

        [data-theme="dark"] .gap-input {
            background: #2d3748;
            color: #ffffff;
        }

        .gap-input:focus {
            border-bottom-color: var(--s);
            background: #e2e8f0;
        }

        [data-theme="dark"] .gap-input:focus {
            background: #4a5568;
        }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
            line-height: 2;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.15);
            border-left: 8px solid var(--s);
            color: var(--s);
        }

        .correct-text {
            color: #16a34a !important;
            font-weight: bold;
        }

        .wrong-text {
            color: #dc2626 !important;
            text-decoration: underline;
            font-weight: bold;
        }

        .answer-key-tag {
            background-color: #f1f5f9;
            padding: 2px 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.15);
            border-left: 8px solid var(--d);
            color: var(--d);
        }

        .hidden {
            display: none !important;
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 5px;
            margin: 2px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        /* ──────────────────────────────────────────────── */
        /* PRINT STYLES - Respect current theme + better readability */
        /* ──────────────────────────────────────────────── */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Hide interactive elements */
            .no-print,
            .pagination-controls,
            .theme-toggle,
            .btn {
                display: none !important;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                margin: 0;
                padding: 10mm;
            }

            .container,
            .quiz-card {
                background: var(--card-bg) !important;
                box-shadow: none !important;
                border: 1px solid var(--border) !important;
                margin-bottom: 40px !important;
                page-break-inside: avoid;
                padding: 15px;
            }

            h2,
            h3 {
                color: var(--p) !important;
            }

            .gap-input {
                background: var(--input-bg) !important;
                color: var(--text-main) !important;
                border-bottom: 3px solid var(--p) !important;
            }

            /* Make correct/wrong more visible in print */
            .feedback-area {
                display: block !important;
                border: 1px solid var(--border) !important;
            }

            .correct-box {
                background-color: rgba(22, 163, 74, 0.12) !important;
                border-left: 8px solid var(--s) !important;
                color: var(--s) !important;
            }

            .wrong-box {
                background-color: rgba(220, 38, 38, 0.12) !important;
                border-left: 8px solid var(--d) !important;
                color: var(--d) !important;
            }

            .ans-tag {
                background: var(--bg) !important;
                border: 1px solid var(--border) !important;
                color: var(--text-main) !important;
            }

            /* Ensure colored inputs stay visible */
            input[style*="color: var(--s)"] {
                color: var(--s) !important;
                border-bottom-color: var(--s) !important;
            }

            input[style*="color: var(--d)"] {
                color: var(--d) !important;
                border-bottom-color: var(--d) !important;
            }

            /* Better spacing for print */
            .quiz-card {
                margin-bottom: 2cm !important;
            }
        }
    </style>
</head>

<body>

    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>

    <div class="container">
        <h2>HSC Article Practice Sheet Generator</h2>
        <p style="text-align: center; color: var(--text-sub);">Fill up these blanks with appropriate articles. For no
            article, keep blank.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions:</label>
                    <textarea id="q-input" placeholder="Example: 1. Article (a) ___ parliament house..."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers:</label>
                    <textarea id="a-input" placeholder="Example: 1. (a) The; (b) an; (c) a; ..."></textarea>
                </div>
            </div>
            <button class="btn btn-start" onclick="processData()">Build Practice Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="summary-stat" style="text-align:center; margin-bottom:30px; font-size:24px; font-weight:bold;">
            </div>

            <div class="pagination-controls no-print">
                <button id="prev-btn" class="btn btn-nav" onclick="changePage(-1)">← Previous</button>
                <span id="page-info" style="align-self: center; font-weight: bold;"></span>
                <button id="next-btn" class="btn btn-nav" onclick="changePage(1)">Next →</button>
            </div>

            <div id="quiz-container"></div>

            <div style="text-align:center;" class="no-print">
                <button class="btn btn-submit" onclick="runEvaluation()">Submit</button>
                <button id="export-btn" class="btn btn-export" onclick="window.print()">Export PDF</button>
                <button id="export-word-btn" class="btn btn-word" onclick="exportToWord()">Export to Word</button>
                <button class="btn btn-reset" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let examData = [];
        let currentPage = 0;
        const itemsPerPage = 10;

        function exportToWord() {
            if (examData.length === 0) {
                alert("কোনো প্রশ্ন লোড করা হয়নি।");
                return;
            }

            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = examData.slice(start, end);

            if (currentItems.length === 0) {
                alert("এই পেজে কোনো প্রশ্ন নেই।");
                return;
            }

            let content = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:w="urn:schemas-microsoft-com:office:word"
              xmlns="http://www.w3.org/TR/REC-html40">
        <head>
            <meta charset="utf-8">
            <title>HSC Article Practice - Page ${currentPage + 1}</title>
            <!--[if gte mso 9]>
            <xml>
                <w:WordDocument>
                    <w:View>Print</w:View>
                    <w:Zoom>100</w:Zoom>
                </w:WordDocument>
            </xml>
            <![endif]-->
            <style>
                body { 
                    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; 
                    line-height: 1.7; 
                    color: #1e293b; 
                    font-size: 11.5pt; 
                }
                h1 { 
                    color: #2563eb; 
                    text-align: center; 
                    text-transform: uppercase; 
                    letter-spacing: 1.2px; 
                    margin-bottom: 0.8em; 
                }
                h2 { 
                    color: #2563eb; 
                    margin: 1.4em 0 0.6em; 
                    font-size: 14pt; 
                }
                .question-set { 
                    margin-bottom: 1.8em; 
                    padding: 1em; 
                    border: 1px solid #cbd5e1; 
                    border-radius: 6px; 
                    background: #f9fafb; 
                }
                .gap-answer { 
                    font-weight: 600; 
                    text-decoration: underline; 
                    text-decoration-thickness: 2.5px; 
                    text-underline-offset: 2px; 
                }
                .correct { 
                    color: #16a34a !important; 
                    text-decoration-color: #16a34a !important; 
                }
                .wrong { 
                    color: #dc2626 !important; 
                    text-decoration-color: #dc2626 !important; 
                }
                .neutral { 
                    color: #000000 !important; 
                    text-decoration-color: #000000 !important; 
                }
                .feedback { 
                    margin-top: 1.2em; 
                    padding: 0.9em; 
                    border-left: 5px solid; 
                    border-radius: 4px; 
                    background: rgba(0,0,0,0.03); 
                }
                .correct-box { 
                    border-left-color: #16a34a; 
                    color: #166534; 
                }
                .wrong-box { 
                    border-left-color: #dc2626; 
                    color: #991b1b; 
                }
                .ans-tag { 
                    background: #f1f5f9; 
                    padding: 3px 7px; 
                    margin: 0 5px 4px 0; 
                    border: 1px solid #cbd5e1; 
                    border-radius: 4px; 
                    display: inline-block; 
                    font-size: 10pt; 
                }
                .page-info { 
                    text-align: center; 
                    font-size: 12pt; 
                    color: #475569; 
                    margin: 1em 0 1.5em; 
                    font-weight: bold; 
                }
            </style>
        </head>
        <body>
            <h1>HSC Article Practice Sheet</h1>
            <div class="page-info">Page ${currentPage + 1} of ${Math.ceil(examData.length / itemsPerPage)} – Exported on ${new Date().toLocaleString('en-GB')}</div>
    `;

            currentItems.forEach((item, localIdx) => {
                const globalIdx = start + localIdx;

                let processedHtml = item.html;

                processedHtml = processedHtml.replace(
                    /<input type="text" class="gap-input" data-qid="[^"]*" data-letter="([a-j])" autocomplete="off">/g,
                    (match, letter) => {
                        const inputEl = document.querySelector(`.gap-input[data-qid="${globalIdx}"][data-letter="${letter}"]`);
                        if (!inputEl) return '______';

                        const value = inputEl.value.trim() || '          ';  // blank এর জন্য স্পেস

                        let colorHex = '#000000';           // default কালো
                        let underlineColor = '#000000';

                        const style = window.getComputedStyle(inputEl);
                        const borderColor = style.borderBottomColor;

                        // border-bottom এর কালার থেকে ধরা (যেহেতু input-এ border-bottom color change হয়)
                        if (borderColor === 'rgb(22, 163, 74)' || borderColor.includes('22, 163, 74')) {
                            colorHex = '#16a34a';
                            underlineColor = '#16a34a';
                        } else if (borderColor === 'rgb(220, 38, 38)' || borderColor.includes('220, 38, 38')) {
                            colorHex = '#dc2626';
                            underlineColor = '#dc2626';
                        }

                        // inline style দিয়ে Word-এ force করা
                        return `<span style="color: ${colorHex}; text-decoration: underline; text-decoration-color: ${underlineColor}; font-weight: 600; text-underline-offset: 2px; text-decoration-thickness: 2px;">${value}</span>`;
                    }
                );

                content += `
            <div class="question-set">
                <h2>Question Set ${globalIdx + 1}</h2>
                <div>${processedHtml}</div>
        `;

                const feedbackEl = document.getElementById(`feedback-${globalIdx}`);
                if (feedbackEl && feedbackEl.style.display !== 'none') {
                    let fbClass = feedbackEl.className.includes('correct-box') ? 'correct-box' : 'wrong-box';
                    let fbHTML = feedbackEl.innerHTML
                        .replace(/<strong>/g, '<strong style="font-size:1.15em;">')
                        .replace(/class="ans-tag"/g, 'class="ans-tag"');

                    content += `
                <div class="feedback ${fbClass}">
                    ${fbHTML}
                </div>
            `;
                }

                content += `</div>`;
            });

            content += `</body></html>`;

            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `HSC_Article_Page_${currentPage + 1}_${new Date().toISOString().slice(0, 10)}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            if (current === "dark") {
                document.documentElement.removeAttribute("data-theme");
            } else {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        }

        function loadDemo() {

            const demoQuestions = `1. Article
(a) ___ parliament house of Bangladesh is (b) ___ exquisitely designed building. In fact, it is (c) ___ wonder of modern architecture and technology. It is one of (d) ___ largest and most spectacular parliament buildings in (e) ___ world. It is (f) ___ highly expensive building. (g) ___ maintenance cost of the parliament house is about 50 million taka per year. An American architect (h) ___ Louis I Kahn designed this (i) ___ building. Every day many (j) ___  visitor comes to visit the building.
[Dhaka Board-2019]

2. Article
The national flag represents (a)_____ independence of (b)_____ country. Ours is (c)_____ independent country. Hence, we have a national flag symbolizing our independence. (d)_____ cloth of a national flag is made of (e)_____ cotton, silk or linen. Our flag is rectangular in shape maintaining (f)_____ ratio of its length and breadth 10: 6, There are different sizes of national flag. The background of our flag is green which symbolizes our life and energy. In the middle point of the flag there is (g)_____ blood-red circle representing our hard struggle and bloodshed. (h)_____ red circle also represents the heroic blood-shed of (i)_____ martyrs. The national flag plays (j)_____ vital role in the life of a nation.
[Rajshahi Board-2019]

3. Article
Childhood or boyhood is (a)_____ man's formative period. During this period (b)_____ child receives training from its mother. (c)_____ mother's tender heart always looks to (d)_____ welfare and well-being of (e)_____ child. If during this period (f)_____ mother tries to bring (g)_____ child up carefully and according to her (h)_____ best ideas (i)_____ child is sure to grow with its superiors, parents and teachers and love (j)_____ all irrespective of caste, creed and color.
[Dinajpur Board-2019]

4. Article 
The industry is (a)_____ key to success in our life. (b)_____ industrious can prosper in life. (c)_____ man who does not undertake (d)_____ hard work can never go (e)_____ long way in (f)_____ world. Many (g)_____ man is not aware of (h)_____ significance of (i)_____ diligence for which. they cannot reap (j)_____ benefit of success.
[Jashore Board-2019]

5. Article
An honest man is true to his (a) _____ words. He does not deviate from (b)_____ path of honesty. He knows that true happiness consists of (c)_____ honesty. He does not fall victim to (d) _____ greed. He does not hanker after (e) _____ worldly property.  (f)_____ honest man abstains from corruption. He does not mix with (g) _____ corrupted people. He is (h) _____ man who tries to get pleasure from good deeds. (i) _____ greed for wealth does not touch him. People should follow the path of (j) _____ honest people of the society
[Cumilla Board-2019]

6. Article
What is patriotism? It is (a)_____ noble virtue. It inspires (b)_____ man to dedicate his life to the freedom and development of his (c)_____ country. (d)_____ man without patriotism is no better than (e)_____ beast. A true patriot is honored by (f)_____ his countrymen. He thinks for (g)_____ betterment of his country. On (h)_____ contrary, (i)_____ unpatriotic man thinks only of his interest. Those who die for (j)_____ country are true patriots.
[Chattogram Board-2019; Dhaka Board2017]

7. Article
I have (a)_____ uncle who has just retired from (b)_____ army. He used to be (c)_____ ABI agent, and everybody says he has been an honest man all his life. As a child, I loved him for his stories. He once told me that he met (d)_____ one-eyed alien from (e)_____ space.  (f)_____ alien did not need any oxygen. And it did not have (g)_____ nose. I now understand that it was (h)_____ hard story to believe. I am not sure he was telling me (i)_____ truth. Maybe he is not so (j)_____ honest, after all.
[Sylhet Board-2019]

8. Article
Mr. Bright is (a)_____ European. As he is (b)_____ Englishman, he knows (c)_____ English well. He is (d)_____ honourable to everyone though he is (e)_____ one-eyed man. One day having (f)_____ SOS, he went to (g)_____ USA. His brother, Johnson living there joined (h)_____ Army last year. He is (i)_____ younger of the two brothers. When Mr. Bright met his brother, he could not but shed (j)_____ tears.
[Barishal Board-2019]

9. Article
Bangladesh is (a)_____ independent country. We won freedom on (b)_____ December 16, 1971. This freedom was won as (c)_____ result of great sacrifice. (d)_____ great many people laid down their lives for (e)_____ freedom of the country. (f)_____ man who loves his country is (g)_____ patriot. (h)_____ real patriot loves his country more than his life. Being patriots, we all should try to make (i)_____ effort for the welfare and (j)_____ progress of our motherland.
[HSC Examination-2018(Ka set)]

10. Article
William Shakespeare was born on April 23, 1564 in (a)_____ village of Stratfordon-Avon in (b)_____ country of Warwickshire. His father John Shakespeare was (c)_____ farmer's son who came (d)_____ Stratford about 1531 and began to prosper as (e)_____ trader in corn, wheat, leather and agricultural products. His mother Mary Arden was (f)_____ daughter of (g)_____ prosperous farmer, descended from (h)_____ old family of mixed AngloSaxon and Norman blood. It is generally believed that neither (i)_____ poet's mother nor his father could read or write. In 1582, Shakespeare married Anne Hathaway, the daughter of (j)_____ peasant family. She was eight years older than Shakespeare.
[HSC Examination-2018(Kha set)]

11. Article
Truthfulness is (a)_____ greatest of all (b)_____ virtues which make (c)_____ man really great. If we do not cultivate the habit of speaking (d)_____ truth, we cannot command (e)_____ confidence of others. (f)_____ might succeed once or twice by telling (g)_____ lie but it never brings a good result. (h)_____lie never lies hidden. Today or tomorrow it comes to light. Then (i)_____ real character of (j)_____ liar is revealed and nobody believes him.
[Rajshahi Board-2017; Barishal Board2017]

12. Article
'Rifle Roti Aurat' is (a)_____ first Bengali novel on (b)_____ Liberation War of Bangladesh. This unique novel is written by Anwar Pasha, (c)_____professor of Bangla department at Dhaka University. He wrote this (d) _____ novel between April and June in 1971. The main characters in this novel is Sudipta Shaheen who shares his dream of (e)_____ new country. Professor Anwar Pasha was picked up from his Dhaka University residence two days before (f)_____victory. Sensing imminent defeat, the member of (g)_____ notorious killing squad Al-Badr picked up (h)_____ novelist Anwar Pasha and many other intellectuals and brutally killed them. According to. (i)_____ Banglapedia, around 991 academics, 13 journalists, 49 physicians, 42 lawyers, and 16 other intellectuals were killed during (j)_____Liberation War of Bangladesh.
[Chattogram Board-2017]

13. Article
In (a)_____ last 25 years (b)_____ world has lost one-third of its natural wealth, according to (c)_____ international conservation organisation world wild fund. (d)_____ earth's forest, wetlands, seas and coasts are in (e) _____ worse state today than they were before. Forests are cut down. Moreover, they are being burnt indiscriminately resulting in (f) ____ increase in carbon dioxide and ultimately in (g) ____ water level rising as a consequence of global warming. It is anticipated that (h) _____ new century will face (i) _____ overwhelming environmental (j) _____ catastrophe.
[Cumilla Board-2017]

14. Article
Robi is (a) — indigent boy. He comes of (b) — needy family. But he is diligent and upright. He has (c) — unique vision for life. He believes that honesty is (d) — key to success. Moreover, he has (e) — deep sense of patriotism. Being imbued with these ideals, he shapes (f) — dream of his life. From (g) — dawn to dusk, he works hard. He never squanders time, wastes money and dissipates (h) — energy. His only aim is to reach (i) — apex of success. We need (j) — ideal boy like Robi.

        function cleanVal(val) {
            if (!val) return "";
            return val.toLowerCase()
                .replace(/[()×:.|—_;\-\t\n]/g, '')
                .replace('cross', 'x')
                .replace(/\s/g, '')
                .trim();
        }

        function processData() {
            const qRaw = document.getElementById('q-input').value;
            const aRaw = document.getElementById('a-input').value;

            if (!qRaw || !aRaw) {
                alert("Please paste both Questions and Answers correctly.");
                return;
            }

            const qBlocks = qRaw.split(/\d+\.\s+Article/i).filter(b => b.trim().length > 15);
            const aBlocks = aRaw.split(/\n\s*\d+\.\s*\n|\n\s*\d+\.\s+/).filter(b => b.trim().length > 0);

            examData = qBlocks.map((text, index) => {
                let html = text.trim().replace(/\(([a-j])\)\s*[_—|-]+/g, (match, letter) => {
                    return `<b>(${letter})</b> <input type="text" class="gap-input" data-qid="${index}" data-letter="${letter}" autocomplete="off">`;
                });

                let ansStr = aBlocks[index] || "";
                let ansMap = {};
                let matches = [...ansStr.matchAll(/\(([a-j])\)\s*([^;(.\n]+)/g)];

                matches.forEach(m => {
                    ansMap[m[1]] = m[2].trim().replace(/[:;.]/g, '').trim();
                });

                return { html, answers: ansMap, originalKey: ansStr };
            });

            currentPage = 0;
            renderExam();
        }

        function renderExam() {
            const container = document.getElementById('quiz-container');
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');

            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = examData.slice(start, end);

            container.innerHTML = currentItems.map((item, localIndex) => {
                const globalIndex = start + localIndex;
                return `
                <div class="quiz-card" id="card-${globalIndex}">
                    <h3 style="color:var(--p); margin-top:0;">Question Set ${globalIndex + 1}</h3>
                    <div class="content-body">${item.html}</div>
                    <div id="feedback-${globalIndex}" class="feedback-area"></div>
                </div>
            `}).join('');

            updatePaginationUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changePage(direction) {
            const totalPages = Math.ceil(examData.length / itemsPerPage);
            const nextP = currentPage + direction;

            if (nextP >= 0 && nextP < totalPages) {
                currentPage = nextP;
                renderExam();
            }

            document.getElementById('summary-stat').innerHTML = '';
        }

        function updatePaginationUI() {
            const totalPages = Math.ceil(examData.length / itemsPerPage);
            document.getElementById('page-info').innerText = `Page ${currentPage + 1} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = currentPage >= totalPages - 1;

            if (totalPages <= 1) {
                document.querySelector('.pagination-controls').classList.add('hidden');
            } else {
                document.querySelector('.pagination-controls').classList.remove('hidden');
            }
        }

        function runEvaluation() {
            let totalMarks = 0;
            let obtainedMarks = 0;

            examData.forEach((item, qIdx) => {
                let setCorrect = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let keyList = [];

                if (inputs.length === 0) return;

                inputs.forEach(input => {
                    totalMarks++;
                    let letter = input.getAttribute('data-letter');
                    let userAns = cleanVal(input.value);
                    let correctAnsRaw = item.answers[letter] || "x";

                    let options = correctAnsRaw.split(/[\/\s]+/).map(o => cleanVal(o));

                    if (options.includes(userAns) || (userAns === 'x' && options.includes('x'))) {
                        input.style.color = "var(--s)";
                        input.style.borderBottomColor = "var(--s)";
                        setCorrect++;
                        obtainedMarks++;
                    } else {
                        input.style.color = "var(--d)";
                        input.style.borderBottomColor = "var(--d)";
                    }
                    keyList.push(`<span class="ans-tag">(${letter}) ${correctAnsRaw}</span>`);
                });

                const fb = document.getElementById(`feedback-${qIdx}`);
                if (fb) {
                    fb.style.display = "block";
                    fb.className = `feedback-area ${setCorrect === inputs.length ? 'correct-box' : 'wrong-box'}`;
                    fb.innerHTML = `<strong>Set Accuracy: ${setCorrect} / ${inputs.length}</strong><br>
                                    <div style="margin-top:10px;"><b>Answer Key:</b> ${keyList.join(' ')}</div>`;
                }
            });

            const allVisibleInputs = document.querySelectorAll('.gap-input');
            let visibleTotal = allVisibleInputs.length;
            let visibleCorrect = 0;

            allVisibleInputs.forEach(input => {
                if (input.style.color === "var(--s)") visibleCorrect++;
            });

            const percentage = Math.round((visibleCorrect / visibleTotal) * 100) || 0;
            document.getElementById('summary-stat').innerHTML =
                `Page Result: ${visibleCorrect} / ${visibleTotal} (${percentage}%)`;

            document.getElementById('export-btn').style.display = "inline-block";
            document.getElementById('export-word-btn').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
