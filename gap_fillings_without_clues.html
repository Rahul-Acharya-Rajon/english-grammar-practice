    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #c94646;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .correct-box {
            background-color: rgba(22, 163, 74, 0.12) !important;
            border-left: 8px solid var(--s) !important;
            color: var(--s) !important;
        }

        .wrong-box {
            background-color: rgba(220, 38, 38, 0.12) !important;
            border-left: 8px solid var(--d) !important;
            color: var(--d) !important;
        }

        @media (max-width: 768px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            body {
                padding: 10px;
            }
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-size: 14px;
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .gap-input {
            display: inline-block;
            min-width: 130px;
            border: none;
            border-bottom: 2px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            outline: none;
            margin: 0 4px;
            padding: 2px;
        }

        .letter-label {
            font-weight: bold;
            color: var(--p);
            margin-right: 2px;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 5px;
            margin: 3px;
            font-size: 0.9em;
        }

        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            background: var(--p);
            color: white;
            padding: 8px 14px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        #total-score {
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
            margin: 20px 0;
            padding: 12px;
            background: var(--input-bg);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--text-sub);
        }

            transition: all 0.2s;
        }

        .check-single-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }

            }

            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                padding: 0 !important;
            }

            .container {
                max-width: 100% !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                background: var(--card-bg) !important;
            }

            .no-print {
                display: none !important;
            }

            .quiz-card {
                display: none !important;
            }

            .quiz-card[style*="block"] {
                display: block !important;
                border: 1px solid var(--border) !important;
                margin-bottom: 15px !important;
                padding: 15px !important;

                background: var(--card-bg) !important;
            }

            /* ─────────────────────────────────────────────────────────────── */

            .gap-input {
                border-bottom: 2px solid var(--p) !important;
                background: var(--input-bg) !important;
                min-width: 100px !important;
                font-size: 12pt !important;
                color: inherit !important;
            }

            h2,
            h3 {
                color: var(--p) !important;
            }

            .feedback-area {
                display: block !important;

</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color:var(--p);">HSC Gap Fillings Without Clues Practice Sheet Generator</h2>
        <p style="text-align: center; color: var(--text-sub);">Fill these sentences with appropriate clues</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions:</label>
                    <textarea id="q-input" placeholder="Paste Questions..."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers:</label>
                    <textarea id="a-input" placeholder="Paste Answers..."></textarea>
                </div>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Build Practice
                Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="total-score" class="no-print hidden">Total Score: — / — (checked sets only)</div>
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Submit</button>
                <button class="btn" style="background:#9333ea" onclick="printSheet()">Export PDF</button>
                <button id="export-word-btn" class="btn" style="background:#2b6cb0;" onclick="exportToWord()">Export to
                    Word</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        const pageSize = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme")
                ? document.documentElement.removeAttribute("data-theme")
                : document.documentElement.setAttribute("data-theme", "dark");
        }

        function exportToWord() {
            if (quizData.length === 0) {
                alert("আগে কুইজ সাবমিat করুন!");
                return;
            }

            const start = currentPage * pageSize;
            const end = Math.min(start + pageSize, quizData.length);
            const currentItems = quizData.slice(start, end);

            let totalCorrect = 0;
            let totalBlanks = 0;

            // কন্টেন্ট প্রসেসিং শুরু
            let exerciseContent = "";
            currentItems.forEach((item, localIdx) => {
                const globalIdx = start + localIdx;
                let exScore = 0;
                let exTotal = 0;
                let keyHTML = "";

                let htmlText = item.html;
                const inputRegex = /<input[^>]*data-letter="([a-j])"[^>]*>/g;

                // ইনপুট ফিল্ডগুলোকে টেক্সট দিয়ে রিপ্লেস করা
                htmlText = htmlText.replace(inputRegex, (match, letter) => {
                    const el = document.querySelector(`.gap-input[data-qid="${globalIdx}"][data-letter="${letter}"]`);
                    exTotal++;
                    totalBlanks++;

                    const official = item.answers[letter] || "";
                    keyHTML += `<span style="display:inline-block; background:#f1f5f9; border:1px solid #cbd5e1; padding:2px 5px; margin:2px; font-size:9pt; border-radius:3px;"><b>(${letter})</b> ${official}</span> `;

                    if (!el) return "_______";

                    const val = el.value.trim() || "_______";
                    // Check computed color to identify correct/wrong
                    const isCorrect = el.style.color === "var(--s)" || el.style.color === "rgb(22, 163, 74)";

                    if (isCorrect) {
                        totalCorrect++;
                        exScore++;
                        return `<span style="color:#16a34a; font-weight:bold; text-decoration:underline;">${val}</span>`;
                    } else {
                        // Wrong answer correction: Double underline fix korte 'line-through' style use kora hoyeche
                        return `<span style="color:#bd3c3c; font-weight:bold; text-decoration:line-through; text-decoration-style:single;">${val}</span>`;
                    }
                });

                exerciseContent += `
        <div style="background-color:#2563eb; color:#ffffff; padding:10px; font-weight:bold; margin-top:20px; margin-bottom:10px;">Exercise No: ${globalIdx + 1}</div>
        <div style="margin-bottom:10px; padding:10px; border:1px solid #e2e8f0; line-height:1.6;">
            ${htmlText}
            <div style="margin-top:10px; padding:8px; background-color:#fffbeb; border-top:1px dashed #fbbf24;">
                <p style="margin:0 0 5px 0; font-weight:bold; color:#b45309; font-size:10pt;">Score: ${exScore} / ${exTotal}</p>
                <div style="font-size:9pt; color:#1e293b;"><b>Correct Answers:</b><br>${keyHTML}</div>
            </div>
        </div>`;
            });

            // স্কোরবোর্ড ক্যালকুলেশন
            const accuracy = totalBlanks > 0 ? ((totalCorrect / totalBlanks) * 100).toFixed(2) : 0;
            const timeSpent = document.getElementById('timer-display')?.innerText || "00:00";
            const wrongAns = totalBlanks - totalCorrect;

            const scoreboardHTML = `
    <div style="margin-top:40px; font-family:Arial, sans-serif;">
        <h2 style="color:#2563eb; border-bottom:2px solid #2563eb; padding-bottom:5px;">Performance Report</h2>
        <table width="100%" cellpadding="10" style="text-align:center; table-layout:fixed; border-collapse:collapse;">
            <tr>
                <td style="background-color:#eff6ff; border:1px solid #bfdbfe;">
                    <div style="color:#1e40af; font-size:10pt;">Attempted</div>
                    <div style="font-size:16pt; font-weight:bold; color:#1e3a8a;">${totalBlanks}</div>
                </td>
                <td style="background-color:#f0fdf4; border:1px solid #bbf7d0;">
                    <div style="color:#166534; font-size:10pt;">Correct</div>
                    <div style="font-size:16pt; font-weight:bold; color:#14532d;">${totalCorrect}</div>
                </td>
                <td style="background-color:#fef2f2; border:1px solid #fecaca;">
                    <div style="color:#991b1b; font-size:10pt;">Wrong</div>
                    <div style="font-size:16pt; font-weight:bold; color:#7f1d1d;">${wrongAns}</div>
                </td>
                <td style="background-color:#fff7ed; border:1px solid #fed7aa;">
                    <div style="color:#9a3412; font-size:10pt;">Accuracy</div>
                    <div style="font-size:16pt; font-weight:bold; color:#7c2d12;">${accuracy}%</div>
                </td>
                <td style="background-color:#f5f3ff; border:1px solid #ddd6fe;">
                    <div style="color:#5b21b6; font-size:10pt;">Time Spent</div>
                    <div style="font-size:16pt; font-weight:bold; color:#4c1d95;">${timeSpent}</div>
                </td>
            </tr>
        </table>
        <div style="background-color:#2563eb; color:white; text-align:center; padding:15px; margin-top:10px; font-size:18pt; font-weight:bold;">
            Grand Total: ${totalCorrect} / ${totalBlanks}
        </div>
        <p style="text-align:right; font-size:8pt; color:#64748b; margin-top:10px;">Date: ${new Date().toLocaleString()}</p>
    </div>`;

            const fullHTML = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
    <head>
        <meta charset="utf-8">
        <style>
            @page { size: A4; margin: 1in; }
            body { font-family: 'Segoe UI', Arial, sans-serif; }
        </style>
    </head>
    <body>
        <h1 style="text-align:center; color:#2563eb;">Gap Fillings Without Clues  Practice Result</h1>
        ${exerciseContent}
        ${scoreboardHTML}
    </body>
    </html>`;

            const blob = new Blob(['\ufeff', fullHTML], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `Result_Report_${new Date().getTime()}.doc`;
            link.click();
        }

        function cleanString(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').trim().replace(/[.;:]/g, '');
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Fill both boxes!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((text, idx) => {
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";
                const pattern = /\(([a-n])\)([\s\S]*?)(?=\([a-n]\)|$)/g;
                let match;
                while ((match = pattern.exec(rawAns)) !== null) {
                    ansMap[match[1]] = match[2].trim().replace(/;$/, '');
                }
                let html = text.replace(/\(([a-n])\)\s*[_—.-]+/g, (m, letter) => {
                    return `<span class="letter-label">(${letter})</span><input type="text" class="gap-input" data-letter="${letter}" data-qid="${idx}" autocomplete="off">`;
                });
                return { html, answers: ansMap, checked: false, score: 0, totalGaps: 0 };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');

            document.getElementById('quiz-container').innerHTML = quizData.map((item, i) => `
                <div class="quiz-card" data-qidx="${i}" style="display: none;">
                    <h3>Set ${i + 1}</h3>
                    
                    <div style="white-space: pre-wrap; font-size: 16px;">${item.html}</div>
                    
                    <!-- নতুন বাটন -->
                    <div style="text-align: left; margin-top: 15px;">
                        <button class="btn check-single-btn" 
                                style="background: var(--s); padding: 10px 20px;"
                                onclick="checkSingleSet(${i})">
                            ✓ Check This Set
                        </button>
                    </div>
                    
                    <div id="fb-${i}" class="feedback-area"></div>
                </div>
            `).join('');

            const pagination = `
                <div id="pagination" class="no-print" style="text-align:center; margin:25px 0;">
                    <button id="prev-btn" class="btn" style="background:#64748b" onclick="prevPage()">Prev</button>
                    <span id="page-info" style="font-size:1.1em; margin:0 20px; font-weight:bold;"></span>
                    <button id="next-btn" class="btn" style="background:#64748b" onclick="nextPage()">Next</button>
                </div>
            `;
            document.getElementById('quiz-container').innerHTML += pagination;

            showPage(0);
        }

        function checkSingleSet(qIdx) {
            const item = quizData[qIdx];
            if (!item) return;

            let score = 0;
            const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
            let keyHTML = "";

            inputs.forEach(input => {
                const letter = input.dataset.letter;
                const userVal = cleanString(input.value);
                const official = item.answers[letter] || "";
                const possible = official.split(/[/;]|\sor\s/).map(o => cleanString(o));
                const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                // রঙ পরিবর্তন
                input.style.setProperty('color', isCorrect ? 'var(--s)' : 'var(--d)', 'important');

                if (isCorrect) score++;
                keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
            });

            // ফিডব্যাক দেখানো
            const fb = document.getElementById(`fb-${qIdx}`);
            fb.style.display = "block";
            if (fb.classList.contains("correct-box")) {
                fb.classList.remove("correct-box");
            } else if (fb.classList.contains("wrong-box")) {
                fb.classList.remove("wrong-box");
            }
            if (score === inputs.length) {
                fb.classList.add("correct-box");
            }
            else {
                fb.classList.add("wrong-box");
            }
            fb.innerHTML = `
        <b>Score: ${score} / ${inputs.length}</b><br>
        <b>Answers:</b> ${keyHTML}
    `;

            // ডেটা আপডেট
            item.checked = true;
            item.score = score;
            item.totalGaps = inputs.length;

            updateTotalScore();
        }

        function showPage(page) {
            currentPage = page;
            const start = page * pageSize;
            const end = Math.min(start + pageSize, quizData.length);

            document.querySelectorAll('.quiz-card').forEach((card, i) => {
                card.style.display = (i >= start && i < end) ? 'block' : 'none';
            });

            const totalPages = Math.ceil(quizData.length / pageSize);
            document.getElementById('page-info').innerHTML = `Page ${page + 1} of ${totalPages}`;

            document.getElementById('prev-btn').disabled = page === 0;
            document.getElementById('next-btn').disabled = page === totalPages - 1;

            document.getElementById('quiz-view').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function prevPage() {
            if (currentPage > 0) showPage(currentPage - 1);
        }

        function nextPage() {
            const totalPages = Math.ceil(quizData.length / pageSize);
            if (currentPage < totalPages - 1) showPage(currentPage + 1);
        }

        function updateTotalScore() {
            let totalCorrect = 0;
            let totalAttemptedGaps = 0;

            quizData.forEach(item => {
                if (item.checked) {
                    totalCorrect += item.score;
                    totalAttemptedGaps += item.totalGaps;
                }
            });

            const scoreEl = document.getElementById('total-score');
            if (totalAttemptedGaps > 0) {
                scoreEl.innerHTML = `Total Score (checked sets): ${totalCorrect} / ${totalAttemptedGaps}`;
                scoreEl.classList.remove('hidden');
            } else {
                scoreEl.classList.add('hidden');
            }
        }

        function checkAnswers() {
            const start = currentPage * pageSize;
            const end = Math.min(start + pageSize, quizData.length);

            for (let qIdx = start; qIdx < end; qIdx++) {
                const item = quizData[qIdx];
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
                let keyHTML = "";

                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanString(input.value);
                    const official = item.answers[letter] || "";
                    const possible = official.split(/[/;]|\sor\s/).map(o => cleanString(o));
                    const isCorrect = userVal !== "" && possible.some(p => p === userVal);

                    input.style.setProperty('color', isCorrect ? 'var(--s)' : 'var(--d)', 'important');

                    if (isCorrect) score++;
                    keyHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
                });

                const fb = document.getElementById(`fb-${qIdx}`);
                fb.style.display = "block";
                if (fb.classList.contains("correct-box")) {
                    fb.classList.remove("correct-box");
                } else if (fb.classList.contains("wrong-box")) {
                    fb.classList.remove("wrong-box");
                }

                if (score === inputs.length) {
                    fb.classList.add("correct-box");
                }
                else {
                    fb.classList.add("wrong-box");
                }
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br><b>Answers:</b> ${keyHTML}`;

                item.checked = true;
                item.score = score;
                item.totalGaps = inputs.length;
            }

            updateTotalScore();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function printSheet() {
            window.print();
        }
    </script>
