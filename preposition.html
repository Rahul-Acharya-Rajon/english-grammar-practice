<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preposition Mastery - Board Practice</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #dc2626;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --text-sub: #475569;
            --input-bg: #fffbeb;
            --border: #cbd5e1;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --input-bg: #334155;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            transition: all 0.3s ease;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            color: var(--p);
            font-size: 28px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            margin: 10px 5px;
            font-size: 16px;
        }

        .btn-start {
            background: var(--p);
            width: 100%;
        }

        .btn-submit {
            background: var(--s);
            width: 250px;
        }

        .btn-export {
            background: #9333ea;
            display: none;
            width: 250px;
        }

        .btn-reset {
            background: #64748b;
            width: 150px;
        }

        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--p);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 35px;
            border-radius: 15px;
            line-height: 2.8;
            background: var(--card-bg);
        }

        .gap-input {
            width: 100px;
            border: none;
            border-bottom: 3px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: bold;
            font-size: 17px;
            outline: none;
            margin: 0 5px;
            border-radius: 5px 5px 0 0;
        }

        /* Pagination Styles */
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px;
            background: var(--bg);
            border-radius: 10px;
        }

        .page-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
            }

            .setup-grid {
                grid-template-columns: 1fr;
            }

            h2 {
                font-size: 22px;
            }

            .theme-toggle {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }

            .btn-submit,
            .btn-export,
            .btn-reset {
                width: 100%;
                margin: 5px 0;
            }

            .quiz-card {
                padding: 15px;
                line-height: 2.2;
            }

            .gap-input {
                width: 80px;
                font-size: 15px;
            }
        }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.15);
            border-left: 8px solid var(--s);
            color: var(--s);
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.15);
            border-left: 8px solid var(--d);
            color: var(--d);
        }

        .hidden {
            display: none;
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 5px;
            margin: 2px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        @media print {

            .no-print,
            .btn,
            .theme-toggle,
            .pagination-controls,
            label {
                display: none !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
            }

            .quiz-card {
                display: block !important;
            }

            .feedback-area {
                display: block !important;
            }
        }
    </style>
</head>

<body>

    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Toggle Mode</div>

    <div class="container">
        <h2 id="top-heading">HSC Preposition Practice Board</h2>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions (Format: 01. Text...):</label>
                    <textarea id="q-input" placeholder="01. A good boy is... (a) ___ hard work."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers (Format: 01. (a) ans;):</label>
                    <textarea id="a-input" placeholder="01. (a) to; (b) of/about;"></textarea>
                </div>
            </div>
            <button class="btn btn-start" onclick="processData()">Build Practice Set</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="summary-stat" style="text-align:center; margin-bottom:30px; font-size:24px; font-weight:bold;">
            </div>

            <div class="pagination-controls no-print" id="pagination-top"></div>

            <div id="quiz-container"></div>

            <div class="pagination-controls no-print" id="pagination-bottom"></div>

            <div style="text-align:center;" class="no-print">
                <button class="btn btn-submit" onclick="runEvaluation()">Check Answers</button>
                <button id="export-btn" class="btn btn-export" onclick="window.print()">Export PDF</button>
                <button class="btn btn-reset" onclick="location.reload()">Clear All</button>
            </div>
        </div>
    </div>

    <script>
        let examData = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            current === "dark" ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }

        function cleanVal(val) {
            if (!val) return "";
            return val.toLowerCase().replace(/[()×:.|—_;\-\t\n]/g, '').replace(/\s/g, '').trim();
        }

        function processData() {
            const qRaw = document.getElementById('q-input').value.trim();
            const aRaw = document.getElementById('a-input').value.trim();

            if (!qRaw || !aRaw) return alert("Please paste both data!");

            const qBlocks = qRaw.split(/\n\s*\d+\.\s*(?:\n)?/).filter(b => b.trim().length > 10);
            const aBlocks = aRaw.split(/\n\s*\d+\.\s*(?:\n)?/).filter(b => b.trim().length > 0);

            examData = qBlocks.map((text, index) => {
                let html = text.trim().replace(/\(([a-j])\)\s*[_—|-]+/g, (match, letter) => {
                    return `<b>(${letter})</b> <input type="text" class="gap-input" data-qid="${index}" data-letter="${letter}" autocomplete="off">`;
                });

                let ansStr = aBlocks[index] || "";
                let ansMap = {};
                let matches = [...ansStr.matchAll(/\(([a-j])\)\s*([^;(.\n]+)/g)];
                matches.forEach(m => {
                    ansMap[m[1]] = m[2].trim().replace(/[:;.]/g, '').trim();
                });

                return { html, answers: ansMap, userValues: [] };
            });

            currentPage = 1;
            renderExam();
        }

        function renderExam() {
            const container = document.getElementById('quiz-container');
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = examData.slice(startIndex, endIndex);

            container.innerHTML = pageData.map((item, localIdx) => {
                const globalIdx = startIndex + localIdx;
                return `
                <div class="quiz-card" id="card-${globalIdx}">
                    <h3 style="color:var(--p); margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Exercise ${globalIdx + 1}</h3>
                    <div class="content-body">${item.html}</div>
                    <div id="feedback-${globalIdx}" class="feedback-area"></div>
                </div>
            `}).join('');

            // Restore user inputs if they were already entered
            pageData.forEach((item, localIdx) => {
                const globalIdx = startIndex + localIdx;
                if (item.userValues.length > 0) {
                    item.userValues.forEach(uv => {
                        const input = document.querySelector(`.gap-input[data-qid="${globalIdx}"][data-letter="${uv.letter}"]`);
                        if (input) input.value = uv.val;
                    });
                }
            });

            updatePagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updatePagination() {
            const totalPages = Math.ceil(examData.length / itemsPerPage);
            const controls = `
                <button class="page-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
                <span>Page ${currentPage} of ${totalPages}</span>
                <button class="page-btn" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
            `;
            document.getElementById('pagination-top').innerHTML = controls;
            document.getElementById('pagination-bottom').innerHTML = controls;
        }

        function changePage(direction) {
            // Save current page data before switching
            const startIndex = (currentPage - 1) * itemsPerPage;
            for (let i = 0; i < itemsPerPage; i++) {
                const globalIdx = startIndex + i;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${globalIdx}"]`);
                if (inputs.length > 0 && examData[globalIdx]) {
                    examData[globalIdx].userValues = Array.from(inputs).map(inp => ({ letter: inp.getAttribute('data-letter'), val: inp.value }));
                }
            }
            currentPage += direction;
            renderExam();
        }

        function runEvaluation() {
            let pageTotal = 0, pageObtained = 0;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, examData.length);

            // Scroll to top of the results
            window.scrollTo({ top: 0, behavior: 'smooth' });

            for (let qIdx = startIndex; qIdx < endIndex; qIdx++) {
                let item = examData[qIdx];
                let setCorrect = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);

                if (inputs.length > 0) {
                    item.userValues = Array.from(inputs).map(i => ({ letter: i.getAttribute('data-letter'), val: i.value }));
                }

                const currentAnswers = item.userValues || [];
                let keyList = [];
                let totalInSet = Object.keys(item.answers).length;

                Object.keys(item.answers).forEach(letter => {
                    pageTotal++;
                    let userAnsObj = currentAnswers.find(ua => ua.letter === letter);
                    let userAnsClean = cleanVal(userAnsObj ? userAnsObj.val : "");
                    let correctAnsRaw = item.answers[letter] || "x";
                    let options = correctAnsRaw.split(/[\/\s]+/).map(o => cleanVal(o));

                    if (options.includes(userAnsClean) && userAnsClean !== "") {
                        pageObtained++;
                        setCorrect++;
                    }
                    keyList.push(`<span class="ans-tag">(${letter}) ${correctAnsRaw}</span>`);
                });

                const fb = document.getElementById(`feedback-${qIdx}`);
                if (fb) {
                    fb.style.display = "block";
                    fb.className = `feedback-area ${setCorrect === totalInSet ? 'correct-box' : 'wrong-box'}`;
                    fb.innerHTML = `<strong>Set Score: ${setCorrect} / ${totalInSet}</strong><br>
                                    <div style="margin-top:10px;"><b>Answer Key:</b> ${keyList.join(' ')}</div>`;

                    inputs.forEach(input => {
                        let letter = input.getAttribute('data-letter');
                        let userAns = cleanVal(input.value);
                        let options = (item.answers[letter] || "x").split(/[\/\s]+/).map(o => cleanVal(o));
                        if (options.includes(userAns) && userAns !== "") {
                            input.style.color = "var(--s)";
                            input.style.borderBottomColor = "var(--s)";
                        } else {
                            input.style.color = "var(--d)";
                            input.style.borderBottomColor = "var(--d)";
                        }
                    });
                }
            }

            document.getElementById('summary-stat').innerText = `Current Page Score: ${pageObtained} / ${pageTotal}`;
            document.getElementById('export-btn').style.display = "inline-block";
        }
    </script>
</body>

</html>
