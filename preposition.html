<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preposition Practice Sheet</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #dc2626;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --text-sub: #475569;
            --input-bg: #fffbeb;
            --border: #cbd5e1;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #cbd5e1;
            --input-bg: #334155;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.8;
            transition: all 0.3s ease;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            color: var(--p);
            font-size: 28px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 14px;
            box-sizing: border-box;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
        }

        label {
            font-weight: bold;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            color: white;
            margin: 10px 5px;
            font-size: 16px;
        }

        .btn-start {
            background: var(--p);
            width: 100%;
        }

        .btn-submit {
            background: var(--s);
            width: 250px;
        }

        .btn-export {
            background: #9333ea;
            display: none;
            width: 250px;
        }

        .btn-word {
            background: #2b6cb0;
            display: none;
            width: 250px;
        }

        .btn-reset {
            background: #64748b;
            width: 150px;
        }

        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--p);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .quiz-card {
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 35px;
            border-radius: 15px;
            line-height: 2.8;
            background: var(--card-bg);
        }

        .gap-input {
            width: 100px;
            border: none;
            border-bottom: 3px solid var(--p);
            text-align: center;
            background: var(--input-bg);
            color: var(--text-main);
            font-weight: bold;
            font-size: 17px;
            outline: none;
            margin: 0 5px;
            border-radius: 5px 5px 0 0;
        }

        /* Pagination Styles */
        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px;
            background: var(--bg);
            border-radius: 10px;
        }

        .page-btn {
            background: var(--p);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        .page-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .quiz-card .btn {
            transition: transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .quiz-card .btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px;
            }

            .setup-grid {
                grid-template-columns: 1fr;
            }

            h2 {
                font-size: 22px;
            }

            .theme-toggle {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }

            .btn-submit,
            .btn-export,
            .btn-reset,
            .btn-word {
                width: 100%;
                margin: 5px 0;
            }

            .quiz-card {
                padding: 15px;
                line-height: 2.2;
            }

            .gap-input {
                width: 80px;
                font-size: 15px;
            }
        }

        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            display: none;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.15);
            border-left: 8px solid var(--s);
            color: var(--s);
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.15);
            border-left: 8px solid var(--d);
            color: var(--d);
        }

        .hidden {
            display: none;
        }

        .ans-tag {
            display: inline-block;
            background: var(--bg);
            padding: 2px 10px;
            border-radius: 5px;
            margin: 2px;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            /* Hide interactive elements */
            .no-print,
            .pagination-controls,
            .theme-toggle,
            .btn {
                display: none !important;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                margin: 0;
                padding: 10mm;
            }

            .container,
            .quiz-card {
                background: var(--card-bg) !important;
                box-shadow: none !important;
                border: 1px solid var(--border) !important;
                margin-bottom: 40px !important;
                page-break-inside: avoid;
                padding: 15px;
            }

            h2,
            h3 {
                color: var(--p) !important;
            }

            .gap-input {
                background: var(--input-bg) !important;
                color: var(--text-main) !important;
                border-bottom: 3px solid var(--p) !important;
            }

            /* Make correct/wrong more visible in print */
            .feedback-area {
                display: block !important;
                border: 1px solid var(--border) !important;
            }

            .correct-box {
                background-color: rgba(22, 163, 74, 0.12) !important;
                border-left: 8px solid var(--s) !important;
                color: var(--s) !important;
            }

            .wrong-box {
                background-color: rgba(220, 38, 38, 0.12) !important;
                border-left: 8px solid var(--d) !important;
                color: var(--d) !important;
            }

            .ans-tag {
                background: var(--bg) !important;
                border: 1px solid var(--border) !important;
                color: var(--text-main) !important;
            }

            /* Ensure colored inputs stay visible */
            input[style*="color: var(--s)"] {
                color: var(--s) !important;
                border-bottom-color: var(--s) !important;
            }

            input[style*="color: var(--d)"] {
                color: var(--d) !important;
                border-bottom-color: var(--d) !important;
            }

            /* Better spacing for print */
            .quiz-card {
                margin-bottom: 2cm !important;
            }
        }
    </style>
</head>

<body>

    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>

    <div class="container">
        <h2 id="top-heading">HSC Preposition Practice Sheet Generator</h2>
        <p style="text-align: center; color: var(--text-sub);">Fill up these blanks with appropriate prepositions. There
            is no negative marking.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions</label>
                    <textarea id="q-input" placeholder="01. A good boy is... (a) ___ hard work."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers</label>
                    <textarea id="a-input" placeholder="01. (a) to; (b) of/about;"></textarea>
                </div>
            </div>
            <button class="btn btn-start" onclick="processData()">Build Practice Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="summary-stat" style="text-align:center; margin-bottom:30px; font-size:24px; font-weight:bold;">
            </div>

            <div class="pagination-controls no-print" id="pagination-top"></div>

            <div id="quiz-container"></div>

            <!-- <div class="pagination-controls no-print" id="pagination-bottom"></div> -->

            <div style="text-align:center;" class="no-print">
                <button class="btn btn-submit" onclick="runEvaluation()">Submit</button>
                <button id="export-btn" class="btn btn-export" onclick="window.print()">Export PDF</button>
                <button id="export-word-btn" class="btn btn-word" onclick="exportToWord()">Export to Word</button>
                <button class="btn btn-reset" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let examData = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        function exportToWord() {
            if (examData.length === 0) {
                alert("কোনো প্রশ্ন লোড করা হয়নি।");
                return;
            }

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const currentItems = examData.slice(start, end);

            if (currentItems.length === 0) {
                alert("এই পেজে কোনো প্রশ্ন নেই।");
                return;
            }

            let content = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:w="urn:schemas-microsoft-com:office:word"
              xmlns="http://www.w3.org/TR/REC-html40">
        <head>
            <meta charset="utf-8">
            <title>HSC Preposition Practice - Page ${currentPage}</title>
            <!--[if gte mso 9]>
            <xml>
                <w:WordDocument>
                    <w:View>Print</w:View>
                    <w:Zoom>100</w:Zoom>
                </w:WordDocument>
            </xml>
            <![endif]-->
            <style>
                body { 
                    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif; 
                    line-height: 1.7; 
                    color: #1e293b; 
                    font-size: 11.5pt; 
                    margin: 2cm 1.5cm;
                }
                h1 { 
                    color: #2563eb; 
                    text-align: center; 
                    text-transform: uppercase; 
                    letter-spacing: 1.2px; 
                    margin-bottom: 0.8em; 
                }
                h2 { 
                    color: #2563eb; 
                    margin: 1.6em 0 0.7em; 
                    font-size: 14pt; 
                    border-bottom: 1px solid #cbd5e1;
                    padding-bottom: 4px;
                }
                .question-set { 
                    margin-bottom: 1.8em; 
                    padding: 1em; 
                    border: 1px solid #cbd5e1; 
                    border-radius: 6px; 
                    background: #f9fafb; 
                }
                .gap-answer { 
                    font-weight: 600; 
                    text-decoration: underline; 
                    text-decoration-thickness: 2.5px; 
                    text-underline-offset: 2px; 
                }
                .correct { 
                    color: #16a34a !important; 
                    text-decoration-color: #16a34a !important; 
                }
                .wrong { 
                    color: #dc2626 !important; 
                    text-decoration-color: #dc2626 !important; 
                }
                .neutral { 
                    color: #000000 !important; 
                    text-decoration-color: #000000 !important; 
                }
                .feedback { 
                    margin-top: 1.2em; 
                    padding: 1em; 
                    border-left: 5px solid; 
                    border-radius: 4px; 
                    background: rgba(0,0,0,0.03); 
                }
                .correct-box { 
                    border-left-color: #16a34a; 
                    color: #166534; 
                }
                .wrong-box { 
                    border-left-color: #dc2626; 
                    color: #991b1b; 
                }
                .ans-tag { 
                    background: #f1f5f9; 
                    padding: 3px 8px; 
                    margin: 0 6px 4px 0; 
                    border: 1px solid #cbd5e1; 
                    border-radius: 4px; 
                    display: inline-block; 
                    font-size: 10pt; 
                }
                .page-info { 
                    text-align: center; 
                    font-size: 12pt; 
                    color: #475569; 
                    margin: 1em 0 1.8em; 
                    font-weight: bold; 
                }
            </style>
        </head>
        <body>
            <h1>HSC Preposition Practice Sheet</h1>
            <div class="page-info">Page ${currentPage} of ${Math.ceil(examData.length / itemsPerPage)} – Exported on ${new Date().toLocaleString('en-GB')}</div>
    `;

            currentItems.forEach((item, localIdx) => {
                const globalIdx = start + localIdx;

                let processedHtml = item.html;

                // input → inline styled underlined span (no extra (a) label)
                processedHtml = processedHtml.replace(
                    /<input type="text" class="gap-input" data-qid="[^"]*" data-letter="([a-j])" autocomplete="off">/g,
                    (match, letter) => {
                        const inputEl = document.querySelector(`.gap-input[data-qid="${globalIdx}"][data-letter="${letter}"]`);
                        if (!inputEl) return '______';

                        const value = inputEl.value.trim() || '          '; // space for blank underline visibility

                        let colorHex = '#000000';
                        let underlineColor = '#000000';

                        const style = window.getComputedStyle(inputEl);
                        const borderColor = style.borderBottomColor;

                        if (borderColor === 'rgb(22, 163, 74)' || borderColor.includes('22, 163, 74')) {
                            colorHex = '#16a34a';
                            underlineColor = '#16a34a';
                        } else if (borderColor === 'rgb(220, 38, 38)' || borderColor.includes('220, 38, 38')) {
                            colorHex = '#dc2626';
                            underlineColor = '#dc2626';
                        }

                        return `<span style="color:${colorHex}; text-decoration:underline; text-decoration-color:${underlineColor}; font-weight:600; text-underline-offset:2px; text-decoration-thickness:2.5px;">${value}</span>`;
                    }
                );

                content += `
            <div class="question-set">
                <h2>Exercise ${globalIdx + 1}</h2>
                <div>${processedHtml}</div>
        `;

                const feedbackEl = document.getElementById(`feedback-${globalIdx}`);
                if (feedbackEl && feedbackEl.style.display !== 'none') {
                    let fbClass = feedbackEl.className.includes('correct-box') ? 'correct-box' : 'wrong-box';
                    let fbHTML = feedbackEl.innerHTML
                        .replace(/<strong>/g, '<strong style="font-size:1.15em;">')
                        .replace(/class="ans-tag"/g, 'class="ans-tag"');

                    content += `
                <div class="feedback ${fbClass}">
                    ${fbHTML}
                </div>
            `;
                }

                content += `</div>`;
            });

            content += `</body></html>`;

            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `HSC_Prep_Page_${currentPage}_${new Date().toISOString().slice(0, 10)}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute("data-theme");
            current === "dark" ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }

        function loadDemo() {

            const demoQuestions = `01.

        function cleanVal(val) {
            if (!val) return "";
            return val.toLowerCase().replace(/[()×:.|—_;\-\t\n]/g, '').replace(/\s/g, '').trim();
        }

        function processData() {
            const qRaw = document.getElementById('q-input').value.trim();
            const aRaw = document.getElementById('a-input').value.trim();

            if (!qRaw || !aRaw) return alert("Please paste both data!");

            const qBlocks = qRaw.split(/\n\s*\d+\.\s*(?:\n)?/).filter(b => b.trim().length > 10);
            const aBlocks = aRaw.split(/\n\s*\d+\.\s*(?:\n)?/).filter(b => b.trim().length > 0);

            examData = qBlocks.map((text, index) => {
                let html = text.trim().replace(/\(([a-j])\)\s*[_—|-]+/g, (match, letter) => {
                    return `<b>(${letter})</b> <input type="text" class="gap-input" data-qid="${index}" data-letter="${letter}" autocomplete="off">`;
                });

                let ansStr = aBlocks[index] || "";
                let ansMap = {};
                let matches = [...ansStr.matchAll(/\(([a-j])\)\s*([^;(.\n]+)/g)];
                matches.forEach(m => {
                    ansMap[m[1]] = m[2].trim().replace(/[:;.]/g, '').trim();
                });

                return { html, answers: ansMap, userValues: [] };
            });

            currentPage = 1;
            renderExam();
        }

        function renderExam() {
            const container = document.getElementById('quiz-container');
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = examData.slice(startIndex, endIndex);

            container.innerHTML = pageData.map((item, localIdx) => {
                const globalIdx = startIndex + localIdx;
                return `
                    <div class="quiz-card" id="card-${globalIdx}">
                        <h3 style="color:var(--p); margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Exercise ${globalIdx + 1}</h3>
                        <div class="content-body">${item.html}</div>
                        
                        <!-- প্রতিটি সেটের জন্য আলাদা চেক বাটন -->
                        <div style="margin-top:15px;" class="no-print">
                            <button class="btn" style="background:var(--p); padding:8px 15px; font-size:14px; width:auto; margin:0;" 
                                    onclick="checkSingleSet(${globalIdx})">Check Answer</button>
                        </div>

                        <div id="feedback-${globalIdx}" class="feedback-area"></div>
                    </div>
                `}).join('');

            // Restore user inputs if they were already entered
            pageData.forEach((item, localIdx) => {
                const globalIdx = startIndex + localIdx;
                if (item.userValues.length > 0) {
                    item.userValues.forEach(uv => {
                        const input = document.querySelector(`.gap-input[data-qid="${globalIdx}"][data-letter="${uv.letter}"]`);
                        if (input) input.value = uv.val;
                    });
                }
            });

            updatePagination();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkSingleSet(qIdx) {
            const item = examData[qIdx];
            const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
            let setCorrect = 0;
            let keyList = [];
            let totalInSet = Object.keys(item.answers).length;

            if (inputs.length === 0) return;

            inputs.forEach(input => {
                let letter = input.getAttribute('data-letter');
                let userAnsRaw = input.value;
                let userAnsClean = cleanVal(userAnsRaw);
                let correctAnsRaw = item.answers[letter] || "x";
                let options = correctAnsRaw.split(/[\/\s]+/).map(o => cleanVal(o));

                if (options.includes(userAnsClean) && userAnsClean !== "") {
                    input.style.color = "var(--s)";
                    input.style.borderBottomColor = "var(--s)";
                    setCorrect++;
                } else {
                    input.style.color = "var(--d)";
                    input.style.borderBottomColor = "var(--d)";
                }
                keyList.push(`<span class="ans-tag">(${letter}) ${correctAnsRaw}</span>`);
            });

            const fb = document.getElementById(`feedback-${qIdx}`);
            if (fb) {
                fb.style.display = "block";
                fb.className = `feedback-area ${setCorrect === totalInSet ? 'correct-box' : 'wrong-box'}`;
                fb.innerHTML = `<strong>Set Score: ${setCorrect} / ${totalInSet}</strong><br>
                        <div style="margin-top:10px;"><b>Answer Key:</b> ${keyList.join(' ')}</div>`;
            }
        }

        function updatePagination() {
            const totalPages = Math.ceil(examData.length / itemsPerPage);
            const controls = `
                <button class="page-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>Previous</button>
                <span>Page ${currentPage} of ${totalPages}</span>
                <button class="page-btn" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
            `;
            document.getElementById('pagination-top').innerHTML = controls;
            // document.getElementById('pagination-bottom').innerHTML = controls;
        }

        function changePage(direction) {
            // Save current page data before switching
            const startIndex = (currentPage - 1) * itemsPerPage;
            for (let i = 0; i < itemsPerPage; i++) {
                const globalIdx = startIndex + i;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${globalIdx}"]`);
                if (inputs.length > 0 && examData[globalIdx]) {
                    examData[globalIdx].userValues = Array.from(inputs).map(inp => ({ letter: inp.getAttribute('data-letter'), val: inp.value }));
                }
            }
            currentPage += direction;
            renderExam();
            document.getElementById('export-btn').style.display = "none";
            document.getElementById('export-word-btn').style.display = "none";
        }

        function runEvaluation() {
            let pageTotal = 0, pageObtained = 0;
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, examData.length);

            // Scroll to top of the results
            window.scrollTo({ top: 0, behavior: 'smooth' });

            for (let qIdx = startIndex; qIdx < endIndex; qIdx++) {
                let item = examData[qIdx];
                let setCorrect = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);

                if (inputs.length > 0) {
                    item.userValues = Array.from(inputs).map(i => ({ letter: i.getAttribute('data-letter'), val: i.value }));
                }

                const currentAnswers = item.userValues || [];
                let keyList = [];
                let totalInSet = Object.keys(item.answers).length;

                Object.keys(item.answers).forEach(letter => {
                    pageTotal++;
                    let userAnsObj = currentAnswers.find(ua => ua.letter === letter);
                    let userAnsClean = cleanVal(userAnsObj ? userAnsObj.val : "");
                    let correctAnsRaw = item.answers[letter] || "x";
                    let options = correctAnsRaw.split(/[\/\s]+/).map(o => cleanVal(o));

                    if (options.includes(userAnsClean) && userAnsClean !== "") {
                        pageObtained++;
                        setCorrect++;
                    }
                    keyList.push(`<span class="ans-tag">(${letter}) ${correctAnsRaw}</span>`);
                });

                const fb = document.getElementById(`feedback-${qIdx}`);
                if (fb) {
                    fb.style.display = "block";
                    fb.className = `feedback-area ${setCorrect === totalInSet ? 'correct-box' : 'wrong-box'}`;
                    fb.innerHTML = `<strong>Set Score: ${setCorrect} / ${totalInSet}</strong><br>
                                    <div style="margin-top:10px;"><b>Answer Key:</b> ${keyList.join(' ')}</div>`;

                    inputs.forEach(input => {
                        let letter = input.getAttribute('data-letter');
                        let userAns = cleanVal(input.value);
                        let options = (item.answers[letter] || "x").split(/[\/\s]+/).map(o => cleanVal(o));
                        if (options.includes(userAns) && userAns !== "") {
                            input.style.color = "var(--s)";
                            input.style.borderBottomColor = "var(--s)";
                        } else {
                            input.style.color = "var(--d)";
                            input.style.borderBottomColor = "var(--d)";
                        }
                    });
                }
            }

            document.getElementById('summary-stat').innerText = `Current Page Score: ${pageObtained} / ${pageTotal}`;
            document.getElementById('export-btn').style.display = "inline-block";
            document.getElementById('export-word-btn').style.display = "inline-block";
        }
    </script>
