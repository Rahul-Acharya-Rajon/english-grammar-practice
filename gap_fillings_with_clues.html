    <script>
        let quizData = [];
        let currentPage = 0;
        const itemsPerPage = 10;

        function exportToWord() {
            if (quizData.length === 0) {
                alert("আগে কুইজ বিল্ড করুন!");
                return;
            }

            const quizClone = document.getElementById("quiz-container").cloneNode(true);

            const inputs = quizClone.querySelectorAll(".gap-input");

            inputs.forEach(input => {

                const userVal = input.value.trim() || "_______";

                const qid = input.dataset.qid;
                const letter = input.dataset.letter;

                // 🔥 REAL input (original DOM থেকে)
                const realInput = document.querySelector(
                    `.gap-input[data-qid="${qid}"][data-letter="${letter}"]`
                );

                let textColor = "#000";

                const computed = window.getComputedStyle(input);

                if (computed.color.includes("22, 163, 74")) {
                    textColor = "#16a34a"; // green
                } else if (input.value.trim() !== "") {
                    textColor = "#b91c1c"; // red
                }

                if (realInput) {
                    const realStyle = window.getComputedStyle(realInput);

                    if (realStyle.color.includes("22, 163, 74")) {
                        textColor = "#16a34a"; // ✅ correct (green)
                    }
                    else if (realInput.value.trim() !== "") {
                        textColor = "#b91c1c"; // ❌ wrong (red)
                    }
                }

                const span = document.createElement("span");
                span.innerHTML = `&nbsp;${userVal}&nbsp;`;
                span.style.borderBottom = "1pt solid #000";
                span.style.fontWeight = "bold";
                span.style.color = textColor;

                input.replaceWith(span);
            });

            // feedback show
            quizClone.querySelectorAll(".feedback-area").forEach(el => {
                el.style.display = "block";
            });

            const fullHTML = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:w="urn:schemas-microsoft-com:office:word">
    <head><meta charset="utf-8"></head>
    <body style="padding:40pt; font-family:Segoe UI, Arial;">
        <h1 style="text-align:center;">Practice Result Report</h1>
        ${quizClone.innerHTML}
    </body>
    </html>`;

            const blob = new Blob(['\ufeff', fullHTML], {
                type: 'application/msword'
            });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Result_${Date.now()}.doc`;
            link.click();
        }

                document.documentElement.removeAttribute("data-theme");

                document.documentElement.setAttribute("data-theme", "dark");
            }
        }

        function clean(s) {
            if (!s) return "";
            return s.toLowerCase()
                .replace(/\s+/g, ' ')     // একাধিক স্পেস → একটা
                .replace(/^\s+|\s+$/g, '') // শুরু/শেষের স্পেস মুছে
                .trim();
        }

        function splitEllipsisPhrase(phrase) {
            if (!phrase.includes('...')) {
                return [phrase.trim()];
            }

            // "What does ... look like" → ["What does", "look like"]
            // "What's ... like" → ["What's", "like"]
            const parts = phrase.split(/\s*\.{3}\s*/);
            return parts.map(p => p.trim()).filter(p => p.length > 0);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();

            if (!qIn || !aIn) return alert("দুটো ঘরই পূরণ করো!");

            const qBlocks = qIn.split(/\n\s*\d+\.\s*/).filter(b => b.trim().length > 5);
            const aBlocks = aIn.split(/\n\s*\d+\.\s*/).filter(b => b.trim().length > 0);

            quizData = qBlocks.map((text, idx) => {
                let ansMap = {};
                let clues = [];

                let answerText = aBlocks[idx] || "";
                answerText = answerText.replace(/^\d+\.\s*/, '');

                // (a) phrase (b) phrase ... ফরম্যাট থেকে parse করা
                let parts = answerText.split(/\s*\(([a-z])\)\s*/g).filter(p => p.trim());

                for (let k = 1; k < parts.length; k += 2) {
                    let letter = parts[k - 1].trim(); // a, b, c...
                    let val = parts[k].split(/;|$/)[0].trim().replace(/[:;]/g, '').trim();
                    if (letter && val) {
                        ansMap[letter] = val;
                        clues.push(val);
                    }
                }

                // যদি উপরের ফরম্যাট না মেলে, তাহলে ; দিয়ে আলাদা করে নেওয়া
                if (Object.keys(ansMap).length === 0) {
                    let items = answerText.split(/;\s*/);
                    items.forEach((item, i) => {
                        let val = item.trim().replace(/^[a-z]\)\s*/i, '');
                        if (val) {
                            let letter = String.fromCharCode(97 + i);
                            ansMap[letter] = val;
                            clues.push(val);
                        }
                    });
                }

                clues = shuffleArray([...new Set(clues)]);  // duplicate remove + shuffle

                let html = text.replace(/_{3,}/g, () => {
                    return `<input type="text" class="gap-input" data-qid="${idx}" autocomplete="off">`;
                });

                html = html.replace(/\(([a-z])\)/gi, '<span class="letter-label">($1)</span>');

                return { html, answers: ansMap, clues };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            currentPage = 0;
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('quiz-container');
            const scoreDisplay = document.getElementById('page-score-display');
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = quizData.slice(start, end);

            scoreDisplay.style.display = 'none';

            container.innerHTML = pageData.map((item, i) => {
                const globalIdx = start + i;
                return `
                    <div class="quiz-card" id="card-${globalIdx}" data-global-id="${globalIdx}">
                        <h3>Exercise ${globalIdx + 1}</h3>
                        <div class="clue-box">${item.clues.map(c => `<div class="clue-item">${c}</div>`).join('')}</div>
                        <div>${item.html}</div>
                        
                        <!-- প্রতিটি সেটের জন্য আলাদা বাটন -->
                        <div style="margin-top: 15px;" class="no-print">
                            <button class="btn" style="background:var(--s); padding: 8px 20px; font-size: 14px;" 
                                onclick="checkSingleExercise(${globalIdx})">Check Answer</button>
                        </div>

                        <div id="fb-${globalIdx}" class="feedback-area"></div>
                    </div>
                `}).join('');

            document.getElementById('page-label').innerText = `Showing Exercises ${start + 1} - ${Math.min(end, quizData.length)} of ${quizData.length}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = end >= quizData.length;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkSingleExercise(qIdx) {
            const card = document.querySelector(`.quiz-card[data-global-id="${qIdx}"]`);
            const item = quizData[qIdx];
            let exerciseScore = 0;
            const inputs = [...card.querySelectorAll('.gap-input')];
            let keys = [];
            let letterIndex = 0;

            let i = 0;
            while (i < inputs.length) {
                const input = inputs[i];
                const letter = String.fromCharCode(97 + letterIndex);
                const expected = (item.answers[letter] || "").trim();
                const userVal = clean(input.value);

                let isCorrect = false;
                let skipNext = false;

                if (userVal === "" && expected !== "") {
                    input.style.color = "var(--d)";
                    keys.push(`<span class="ans-tag">(${letter}) ${expected}</span>`);
                    i++; letterIndex++; continue;
                }

                // DOUBLE BLANK (...) check
                if (expected.includes('...') && i + 1 < inputs.length) {
                    const nextInput = inputs[i + 1];
                    const nextVal = clean(nextInput.value);
                    const expParts = expected.split('...').map(p => clean(p.trim()));

                    if (userVal === expParts[0] && nextVal === expParts[1]) {
                        isCorrect = true;
                    }

                    if (isCorrect) {
                        exerciseScore += 2;
                        nextInput.style.color = "var(--s)";
                    } else {
                        nextInput.style.color = "var(--d)";
                    }
                    skipNext = true;
                }
                else {
                    if (userVal === clean(expected)) isCorrect = true;
                    if (isCorrect) exerciseScore += 1;
                }

                input.style.color = isCorrect ? "var(--s)" : "var(--d)";
                keys.push(`<span class="ans-tag">(${letter}) ${expected}</span>`);

                i++; letterIndex++;
                if (skipNext) { i++; letterIndex++; }
            }

            const fb = document.getElementById(`fb-${qIdx}`);
            fb.style.display = "block";
            fb.className = `feedback-area ${exerciseScore === inputs.length ? 'correct-box' : 'wrong-box'}`;
            fb.innerHTML = `<b>Score: ${exerciseScore} / ${inputs.length}</b><br><br>Answer Key:<br>${keys.join('')}`;
        }

        function changePage(direction) {
            currentPage += direction;
            document.getElementById('export-word-btn').style.display = "none";
            document.getElementById('export-pdf-btn').style.display = "none";
            renderPage();
        }

        function checkPageAnswers() {
            const visibleCards = document.querySelectorAll('.quiz-card');
            let totalPageScore = 0;
            let totalPagePossible = 0;

            visibleCards.forEach(card => {
                const qIdx = parseInt(card.getAttribute('data-global-id'));
                const item = quizData[qIdx];
                let exerciseScore = 0;
                const inputs = [...card.querySelectorAll('.gap-input')];
                let keys = [];
                let letterIndex = 0;   // a থেকে শুরু করে যতদূর দরকার

                let i = 0;
                while (i < inputs.length) {
                    const input = inputs[i];
                    const letter = String.fromCharCode(97 + letterIndex);
                    const expected = (item.answers[letter] || "").trim();
                    const userVal = clean(input.value);

                    let isCorrect = false;
                    let skipNext = false;

                    // খালি রাখলে সরাসরি ভুল (যদি expected খালি না হয়)
                    if (userVal === "" && expected !== "") {
                        input.style.color = "var(--d)";
                        if (expected) {
                            keys.push(`<span class="ans-tag">(${letter}) ${expected}</span>`);
                        }
                        i++;
                        letterIndex++;
                        continue;
                    }

                    // DOUBLE BLANK (...) case
                    if (expected.includes('...') && i + 1 < inputs.length) {
                        const nextInput = inputs[i + 1];
                        const nextVal = clean(nextInput.value);

                        if (userVal === "" || nextVal === "") {
                            isCorrect = false;
                        } else {
                            const expParts = expected.split('...').map(p => clean(p.trim()));
                            if (expParts.length >= 2) {
                                if (userVal === expParts[0] && nextVal === expParts[1]) {
                                    isCorrect = true;
                                } else if (
                                    [userVal, nextVal].sort().join(' ') ===
                                    expParts.slice(0, 2).sort().join(' ')
                                ) {
                                    isCorrect = true;
                                }
                            }
                        }

                        if (isCorrect) {
                            exerciseScore += 2;
                            nextInput.style.color = "var(--s)";
                        } else {
                            nextInput.style.color = "var(--d)";
                        }
                        skipNext = true;
                    }
                    // SINGLE BLANK
                    else {
                        const expClean = clean(expected);
                        if (userVal === expClean) {
                            isCorrect = true;
                        } else {
                            // word order flexible
                            const userSorted = userVal.split(' ').sort().join(' ');
                            const expSorted = expClean.split(' ').sort().join(' ');
                            if (userSorted === expSorted && userVal !== "") {
                                isCorrect = true;
                            }
                        }

                        if (isCorrect) exerciseScore += 1;
                    }

                    input.style.color = isCorrect ? "var(--s)" : "var(--d)";

                    if (expected) {
                        keys.push(`<span class="ans-tag">(${letter}) ${expected}</span>`);
                    }

                    i++;
                    letterIndex++;
                    if (skipNext) {
                        i++;
                        letterIndex++;
                    }
                }

                totalPageScore += exerciseScore;
                totalPagePossible += inputs.length;

                const fb = document.getElementById(`fb-${qIdx}`);
                fb.style.display = "block";
                fb.className = `feedback-area ${exerciseScore === inputs.length && inputs.length > 0 ? 'correct-box' : 'wrong-box'}`;
                fb.innerHTML = `<b>Score: ${exerciseScore} / ${inputs.length}</b><br><br>Answer Key:<br>${keys.join('')}`;
            });

            const scoreDisplay = document.getElementById('page-score-display');
            scoreDisplay.innerHTML = `<b>Total Score for this Page: ${totalPageScore} / ${totalPagePossible}</b>`;
            scoreDisplay.style.display = 'block';
            document.getElementById('export-word-btn').style.display = "inline-block";
            document.getElementById('export-pdf-btn').style.display = "inline-block";

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ==================== FULL ANSWER KEY FEATURE ====================
        function showAnswerKey() {
            if (quizData.length === 0) {
                alert("প্রথমে প্রশ্ন লোড করুন!");
                return;
            }

            const container = document.getElementById('quiz-container');
            const originalContent = container.innerHTML;

            let keyHTML = `
        <h2 style="text-align:center; color:var(--p); margin-bottom:25px;">
            📋 Full Answer Key - All Gap Fillings With Clues Exercises
        </h2>
    `;

            quizData.forEach((item, qIdx) => {
                let content = item.html;

                // Replace input fields with correct answers
                Object.keys(item.answers).forEach(letter => {
                    const ans = item.answers[letter] || "×";
                    const replacement = `
                <b>(${letter})</b> 
                <strong style="color:var(--s); background:#ecfdf5; padding:0px 10px; border-radius:6px; border:1px solid #10b981;">
                    ${ans}
                </strong>
            `;
                    content = content.replace(
                        new RegExp(`<span class="letter-label">\\(${letter}\\)</span>\\s*<input[^>]*>`, 'g'),
                        replacement
                    );
                    content = content.replace(
                        new RegExp(`<input[^>]*data-letter=["']${letter}["'][^>]*>`, 'g'),
                        replacement
                    );
                });

                keyHTML += `
            <div class="quiz-card" style="margin-bottom:25px;">
                <h3 style="color:var(--p);">Exercise ${qIdx + 1}</h3>
                <div class="clue-box">${item.clues ? item.clues.map(c => `<div class="clue-item">${c}</div>`).join('') : ''}</div>
                <div>${content}</div>
            </div>
        `;
            });

            container.innerHTML = keyHTML;

            // Back Button
            const backBtn = document.createElement('button');
            backBtn.className = 'btn';
            backBtn.style.background = '#64748b';
            backBtn.style.margin = '25px auto';
            backBtn.style.display = 'block';
            backBtn.textContent = '← Back to Practice Sheet';
            backBtn.onclick = () => {
                container.innerHTML = originalContent;
            };

            container.appendChild(backBtn);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
