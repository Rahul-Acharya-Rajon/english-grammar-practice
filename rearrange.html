<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="margin: 0; color: var(--p);">HSC Rearrange Practice Sheet Generator</h2>
        <!-- <div class="no-print upper-box">
        </div> -->
        <p style="text-align: center; color: var(--text-sub);">Arrange these paragraphs according to the correct
            order so that the whole sentences makes sense</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label>1. Paste Questions:</label>
                    <textarea id="q-input" placeholder="Example: 1. Article (a) ___ parliament house..."></textarea>
                </div>
                <div>
                    <label>2. Paste Answers:</label>
                    <textarea id="a-input" placeholder="Example: 1. (a) The; (b) an; (c) a; ..."></textarea>
                </div>
            </div>
            <button class="btn btn-start" onclick="initQuiz()">Build Practice Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="summary-stat"
                style="text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; color: var(--s);">
            </div>

            <div class="no-print upper-box"
                style="display: flex; justify-content: space-between; gap: 20px; margin-bottom: 30px;">
                <button id="prev-btn" class="btn btn-nav" onclick="changePage(-1)">← Prev</button>
                <span id="page-info" style="font-weight: bold; font-size: 18px; align-self: center;"></span>
                <button id="next-btn" class="btn btn-nav" onclick="changePage(1)">Next →</button>
            </div>

            <div id="quiz-container"></div>

            <div style="text-align: center; margin-top: 30px;" class="no-print">
                <button class="btn btn-s" style="padding: 15px 40px;" onclick="checkFullPage()">Check Page
                    Result</button>
                <!-- <button class="btn btn-nav" onclick="window.print()">🖨️ Print</button> -->
                <button id="export-btn" class="btn btn-export" onclick="window.print()">Export PDF</button>
                <button id="export-word-btn" class="btn btn-word" onclick="exportToWord()">Export to Word</button>
                <button class="btn btn-reset" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

            const demoQuestions = `

        let examData = [];
        let currentPage = 0;
        const itemsPerPage = 10;

        function initQuiz() {
            const rawQuestions = document.getElementById('q-input').value;
            const rawAnswers = document.getElementById('a-input').value;

            if (!rawQuestions || !rawAnswers) {
                alert("Please paste both Questions and Answers correctly.");
                return;
            }

            // ১. Questions alada kora: shurur number (e.g. 1. 2.) bad diye split kora
            const qBlocks = rawQuestions.trim().split(/\n\s*\d+\./).filter(s => s.trim() !== "");

            // ২. Answers alada kora: "01. Answer:", "1. Answer:" ba shudhu "Answer:" bad deya
            const aBlocks = rawAnswers.trim().split(/\n\s*\d+\./).filter(s => s.trim() !== "");

            examData = qBlocks.map((q, index) => {
                let ansLine = aBlocks[index] ? aBlocks[index] : "";

                // Ekhane extra cleaning: "Answer:" kothata ebong tar pashe thaka space ba colon bad deya
                ansLine = ansLine.replace(/^\d+\.\s*/, '').replace(/Answer\s*:\s*/i, '').replace(/;/g, '').trim();

                return {
                    question: q.trim(),
                    answerKey: ansLine.split('+').map(a => a.trim())
                };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            const start = currentPage * itemsPerPage;
            const end = Math.min(start + itemsPerPage, examData.length);

            for (let i = start; i < end; i++) {
                const item = examData[i];
                const card = document.createElement('div');
                card.className = 'quiz-card';

                let inputsHtml = '';
                item.answerKey.forEach((_, idx) => {
                    inputsHtml += `<input type="text" class="gap-input" data-qid="${i}" data-idx="${idx}" placeholder="">`;
                    if (idx < item.answerKey.length - 1) inputsHtml += `<span class="plus-sign">+</span>`;
                });

                card.innerHTML = `
                    <div style="font-weight:bold; color:var(--p); margin-bottom:10px;">SET ${i + 1}</div>
                    <div style="white-space: pre-wrap; margin-bottom:15px; font-weight: 500;">${item.question}</div>
                    <div class="rearrange-box">
                        <strong style="margin-right:10px;"></strong> ${inputsHtml}
                    </div>
                    <button class="btn btn-p no-print" style="margin-top:15px; padding:8px 20px;" onclick="checkSet(${i})">Check Answer</button>
                    <div id="feedback-${i}" class="feedback-area"></div>
                `;
                container.appendChild(card);
            }

            document.getElementById('page-info').innerText = `Page ${currentPage + 1} of ${Math.ceil(examData.length / itemsPerPage)}`;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkSet(qIdx) {
            const inputs = document.querySelectorAll(`.gap-input[data-qid="${qIdx}"]`);
            const correctOnes = examData[qIdx].answerKey;
            let setCorrect = 0;
            let keyList = [];

            inputs.forEach((input, idx) => {
                const userVal = input.value.trim().toLowerCase().replace(/[()]/g, '');
                const correctValRaw = correctOnes[idx].trim();
                const correctValClean = correctValRaw.toLowerCase().replace(/[()]/g, '');

                if (userVal === correctValClean && userVal !== "") {
                    input.style.color = "var(--s)";
                    input.style.borderColor = "var(--s)";
                    setCorrect++;
                } else {
                    input.style.color = "var(--d)";
                    input.style.borderColor = "var(--d)";
                }

                // আর্টিকেল ফাইলের মতো অ্যানসার ট্যাগ তৈরি
                keyList.push(`<span class="ans-tag">${correctValRaw}</span>`);
            });

            const fb = document.getElementById(`feedback-${qIdx}`);
            if (fb) {
                fb.style.display = "block";
                // সব সঠিক হলে গ্রিন বক্স, না হলে রেড বক্স (আর্টিকেল ফাইলের লজিক)
                fb.className = `feedback-area ${setCorrect === inputs.length ? 'correct-box' : 'wrong-box'}`;

                // একুরেসি এবং অ্যানসার কি প্রদর্শন
                fb.innerHTML = `
            <strong>Accuracy: ${setCorrect} / ${inputs.length}</strong><br>
            <div style="margin-top:10px;">
                <b>Correct Order:</b> ${keyList.join(' <span style="color:var(--p); font-weight:bold;">+</span> ')}
            </div>
        `;
            }
        }

        function checkFullPage() {
            const start = currentPage * itemsPerPage;
            const end = Math.min(start + itemsPerPage, examData.length);
            for (let i = start; i < end; i++) checkSet(i);

            let pageInputs = document.querySelectorAll('.gap-input');
            let correctCount = 0;
            pageInputs.forEach(input => { if (input.style.color === "var(--s)") correctCount++; });

            const percentage = Math.round((correctCount / pageInputs.length) * 100) || 0;
            document.getElementById('summary-stat').innerHTML = `Page Result: ${correctCount} / ${pageInputs.length} (${percentage}%)`;
        }

        function changePage(dir) {
            const totalPages = Math.ceil(examData.length / itemsPerPage);
            if (currentPage + dir >= 0 && currentPage + dir < totalPages) {
                currentPage += dir;
                renderPage();
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.getAttribute("data-theme") === "dark" ? html.removeAttribute("data-theme") : html.setAttribute("data-theme", "dark");
        }
    </script>
