<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Transformation Master</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #d53f3f;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .intro-text {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--p);
            display: block;
        }

        .sentence-row {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .q-text {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .gap-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--p);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px 4px 0 0;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .ans-tag {
            display: block;
            background: #f0f7ff;
            border: 1px solid var(--p);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.95em;
            color: #1e40af;
        }

        [data-theme="dark"] .ans-tag {
            background: #1e293b;
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        .page-info {
            text-align: center;
            font-weight: bold;
            margin: 15px 0;
            color: var(--p);
        }

        /* --- COLOR PRINT OPTIMIZATION --- */
        @media print {
            @page {
                margin: 1cm;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body {
                padding: 0 !important;
                background: var(--bg) !important;
                color: var(--text-main) !important;
            }

            .no-print,
            .theme-toggle {
                display: none !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                background: transparent !important;
            }

            .quiz-card {
                border: 2px solid var(--p) !important;
                margin-bottom: 20px !important;
                padding: 15px !important;
                page-break-inside: avoid;
                border-radius: 10px !important;
                background: var(--card-bg) !important;
            }

            .intro-text {
                color: var(--p) !important;
            }

            .gap-input {
                border-bottom: 2px solid var(--p) !important;
                background: var(--input-bg) !important;
                color: var(--text-main) !important;
            }

            .input-correct {
                color: var(--s) !important;
            }

            .input-wrong {
                color: var(--d) !important;
            }

            .feedback-area {
                display: block !important;
                background: var(--card-bg) !important;
                border-left: 5px solid var(--s) !important;
                border-top: 1px solid var(--border) !important;
                border-right: 1px solid var(--border) !important;
                border-bottom: 1px solid var(--border) !important;
            }

            .ans-tag {
                border: 1px solid var(--p) !important;
                color: #1e40af !important;
                background: #f0f7ff !important;
            }

            [data-theme="dark"] .ans-tag {
                background: #1e293b !important;
                color: #60a5fa !important;
                border-color: #3b82f6 !important;
            }

            .page-info,
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center;">HSC Sentence Transformation</h2>

        <div id="setup-view" class="no-print">
            <p>Enter Questions & Answers</p>
            <div class="setup-grid">
                <textarea id="q-input" placeholder="Paste Questions..."></textarea>
                <textarea id="a-input" placeholder="Paste Answers..."></textarea>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Generate Sheet</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="page-info no-print" id="page-info">Page 1 of 1</div>
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button id="prev-btn" class="btn" style="background:#3b82f6" onclick="prevPage()">Previous</button>
                <button id="next-btn" class="btn" style="background:#3b82f6" onclick="nextPage()">Next</button>
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Check Answers</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Print in Color</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        let setsPerPage = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }

        function cleanStr(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').replace(/[.,?!]/g, '').trim();
        }

        function scrollToTop() {
            document.querySelector('.container').scrollIntoView({ behavior: 'smooth', block: 'start' });
            // অথবা আরও উপরে যেতে চাইলে: window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function expandVariants(text) {

            let results = [text];

            while (results.some(t => /\b[\w'-]+\/[\w'-]+\b/.test(t))) {

                let newResults = [];

                results.forEach(str => {

                    const match = str.match(/\b([\w'-]+)\/([\w'-]+)\b/);

                    if (match) {

                        newResults.push(str.replace(match[0], match[1]));
                        newResults.push(str.replace(match[0], match[2]));

                    } else {

                        newResults.push(str);

                    }

                });

                results = newResults;
            }

            return [...new Set(results.map(r => r.trim()))];
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Fill both boxes!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((block, idx) => {
                let sentences = [];
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";

                const introPart = block.split(/\([a-e]\)/)[0].trim();

                const qRegex = /\(([a-e])\)\s*([\s\S]*?)(?=\([a-e]\)|$)/g;
                let qMatch;
                while ((qMatch = qRegex.exec(block)) !== null) {
                    sentences.push({ letter: qMatch[1], text: qMatch[2].trim() });
                }

                const aRegex = /\(([a-e])\)\s*([\s\S]*?)(?=\([a-e]\)|$)/g;
                let aMatch;
                while ((aMatch = aRegex.exec(rawAns)) !== null) {
                    const fullText = aMatch[2].trim();
                    // const options = fullText.split(/\s+Or,\s+|\s+or\s+|;/gi).map(o => o.trim());
                    let options = fullText
                        .split(/\s+Or,\s+|\s+or\s+|;/gi)
                        .map(o => o.trim());

                    let expanded = [];

                    options.forEach(opt => {
                        expanded.push(...expandVariants(opt));
                    });

                    options = expanded;
                    
                    ansMap[aMatch[1]] = {
                        original: fullText,
                        options: options
                    };
                }

                return { intro: introPart, sentences, answers: ansMap, score: null };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderPage(0);
        }

        function renderPage(page) {
            currentPage = page;
            const totalPages = Math.ceil(quizData.length / setsPerPage);
            const start = page * setsPerPage;
            const end = Math.min(start + setsPerPage, quizData.length);

            document.getElementById('page-info').textContent =
                `Page ${page + 1} of ${totalPages}  |  Total Sets: ${quizData.length}`;

            document.getElementById('quiz-container').innerHTML = quizData.slice(start, end).map((set, localIdx) => {
                const globalIdx = start + localIdx;
                return `
                    <div class="quiz-card">
                        <h3 style="margin-top:0">Practice Set ${globalIdx + 1}</h3>
                        <div class="intro-text">${set.intro}</div>
                        ${set.sentences.map(s => `
                            <div class="sentence-row">
                                <span class="q-text"><b>(${s.letter})</b> ${s.text}</span>
                                <input type="text" class="gap-input" data-letter="${s.letter}" data-set="${globalIdx}" autocomplete="off">
                            </div>
                        `).join('')}
                        <div id="fb-${globalIdx}" class="feedback-area"></div>
                    </div>
                `;
            }).join('');

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            prevBtn.disabled = page === 0;
            nextBtn.disabled = end >= quizData.length;
        }

        function prevPage() {
            if (currentPage > 0) {
                renderPage(currentPage - 1);
                scrollToTop();
            }
        }

        function nextPage() {
            if ((currentPage + 1) * setsPerPage < quizData.length) {
                renderPage(currentPage + 1);
                scrollToTop();
            }
        }

        function checkAnswers() {
            const start = currentPage * setsPerPage;
            const end = Math.min(start + setsPerPage, quizData.length);
            let pageTotalScore = 0;
            let pageTotalQuestions = 0;

            for (let setIdx = start; setIdx < end; setIdx++) {
                const set = quizData[setIdx];
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-set="${setIdx}"]`);
                let feedbackHTML = "<b>Correct Answers:</b><br>";

                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanStr(input.value);
                    const ansData = set.answers[letter];

                    if (ansData) {
                        const isCorrect = userVal !== "" && ansData.options.some(opt => cleanStr(opt) === userVal);

                        if (isCorrect) {
                            input.style.color = "var(--s)";
                            input.classList.add('input-correct');
                            input.classList.remove('input-wrong');
                            score++;
                        } else {
                            input.style.color = "var(--d)";
                            input.classList.add('input-wrong');
                            input.classList.remove('input-correct');
                        }
                        feedbackHTML += `<span class="ans-tag"><b>(${letter})</b> ${ansData.original}</span>`;
                    }
                });

                // save score for this set
                set.score = score;

                const fb = document.getElementById(`fb-${setIdx}`);
                fb.style.display = "block";
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br>${feedbackHTML}`;

                pageTotalScore += score;
                pageTotalQuestions += inputs.length;
            }

            // show page summary
            const pageInfo = document.getElementById('page-info');
            pageInfo.innerHTML =
                `Page ${currentPage + 1} of ${Math.ceil(quizData.length / setsPerPage)}  |  ` +
                `Total Sets: ${quizData.length}  |  ` +
                `This Page Score: ${pageTotalScore} / ${pageTotalQuestions}`;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
