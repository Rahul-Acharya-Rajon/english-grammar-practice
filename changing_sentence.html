<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changing Sentences Practice Sheet</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #d53f3f;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .intro-text {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--p);
            display: block;
        }

        .sentence-row {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .q-text {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .gap-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--p);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px 4px 0 0;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .ans-tag {
            display: block;
            background: #f0f7ff;
            border: 1px solid var(--p);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.95em;
            color: #1e40af;
        }

        [data-theme="dark"] .ans-tag {
            background: #1e293b;
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        .page-info {
            text-align: center;
            font-weight: bold;
            margin: 15px 0;
            color: var(--p);
        }

        @media (max-width: 768px) {
            .setup-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            .btn-submit,
            .btn-export,
            .btn-reset,
            .btn-word,
            .btn {
                width: 100% !important;
                margin: 5px 0;
            }

            h2 {
                font-size: 22px !important;
            }
        }

        /* --- COLOR PRINT OPTIMIZATION --- */
        @media print {
            @page {
                margin: 1cm;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            body {
                padding: 0 !important;
                background: var(--bg) !important;
                color: var(--text-main) !important;
            }

            .no-print,
            .theme-toggle {
                display: none !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                background: transparent !important;
            }

            .quiz-card {
                border: 2px solid var(--p) !important;
                margin-bottom: 20px !important;
                padding: 15px !important;
                page-break-inside: avoid;
                border-radius: 10px !important;
                background: var(--card-bg) !important;
            }

            .intro-text {
                color: var(--p) !important;
            }

            .gap-input {
                border-bottom: 2px solid var(--p) !important;
                background: var(--input-bg) !important;
                color: var(--text-main) !important;
            }

            .input-correct {
                color: var(--s) !important;
            }

            .input-wrong {
                color: var(--d) !important;
            }

            .feedback-area {
                display: block !important;
                background: var(--card-bg) !important;
                border-left: 5px solid var(--s) !important;
                border-top: 1px solid var(--border) !important;
                border-right: 1px solid var(--border) !important;
                border-bottom: 1px solid var(--border) !important;
            }

            .ans-tag {
                border: 1px solid var(--p) !important;
                color: #1e40af !important;
                background: #f0f7ff !important;
            }

            [data-theme="dark"] .ans-tag {
                background: #1e293b !important;
                color: #60a5fa !important;
                border-color: #3b82f6 !important;
            }

            .page-info,
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color: var(--p);">HSC Changing Sentences Practice Sheet
            Generator</h2>
        <p style="text-align: center; color: var(--text-sub);">Change these sentences according to directions.</p>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">1. Paste All Questions:</label>
                    <textarea id="q-input"
                        placeholder="Paste Questions (like: 1. (b) At that time his mother asked him for a glass of water. (passive))"></textarea>
                </div>
                <div>
                    <label style="display:block; margin-bottom:8px; font-weight:600;">2. Paste All Answers:</label>
                    <textarea id="a-input" placeholder="Paste Answers (like: 1. (b) At that time, he was asked for a glass of
water by his mother.)"></textarea>
                </div>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Build Practice
                Sheet</button>
            <button class="btn" style="background:#f59e0b; width:100%" onclick="loadDemo()">Load Demo Questions &
                Answers</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div class="page-info no-print" id="page-info">Page 1 of 1</div>
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Submit</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Export PDF</button>
                <button id="export-word-btn" class="btn" style="background:#2b6cb0;" onclick="exportToWord()">Export to
                    Word</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
                <div id="pagination" style="margin-top: 10px;">
                    <button id="prev-btn" class="btn" style="background:#3b82f6" onclick="prevPage()">Previous</button>
                    <button id="next-btn" class="btn" style="background:#3b82f6" onclick="nextPage()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        let setsPerPage = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }

        function exportToWord() {
            if (quizData.length === 0) {
                alert("কোনো প্রশ্ন লোড করা হয়নি।");
                return;
            }

            const start = currentPage * setsPerPage;
            const end = Math.min(start + setsPerPage, quizData.length);
            const currentSets = quizData.slice(start, end);

            if (currentSets.length === 0) {
                alert("এই পেজে কোনো সেট নেই।");
                return;
            }

            let content = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: 'Calibri', 'Arial', sans-serif; line-height: 1.6; }
        .question-set { margin-bottom: 25px; padding: 15px; border: 1px solid #cbd5e1; }
        .sentence-row { margin-bottom: 12px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px; }
    </style>
</head>
<body>
    <h1 style="color: #2563eb; text-align: center;">HSC Changing Sentences Practice Sheet</h1>
    <p style="text-align:center; color:#475569;">
        Page ${currentPage + 1} of ${Math.ceil(quizData.length / setsPerPage)} – Exported on ${new Date().toLocaleDateString('en-GB')}
    </p>
`;

            currentSets.forEach((set, localIdx) => {
                const globalIdx = start + localIdx;
                const fb = document.getElementById(`fb-${globalIdx}`);
                const hasFeedback = fb && fb.style.display !== 'none';

                content += `
        <div class="question-set">
            <h2 style="color: #2563eb;">Practice Set ${globalIdx + 1}</h2>
            <p style="font-weight: bold; color: #2563eb;">${set.intro.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
`;

                set.sentences.forEach(s => {
                    const input = document.querySelector(`.gap-input[data-set="${globalIdx}"][data-letter="${s.letter}"]`);
                    const userText = input ? input.value.trim() : "";

                    // কালার লজিক ফিক্সড
                    let statusColor = '#334155'; // ডিফল্ট কালো/ধূসর

                    if (hasFeedback && input) {
                        if (input.classList.contains('input-correct')) {
                            statusColor = '#16a34a'; // সবুজ
                        } else if (input.classList.contains('input-wrong')) {
                            statusColor = '#d53f3f'; // লাল
                        }
                    }

                    content += `
            <div class="sentence-row">
                <p style="margin: 5px 0;"><b>(${s.letter})</b> ${s.text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>
                <p style="margin: 5px 0;">Your answer: 
                    <span style="font-weight: bold; color: ${statusColor}; text-decoration: underline;">
                        ${userText || '[খালি]'}
                    </span>
                </p>
            </div>`;
                });

                if (hasFeedback) {
                    // ফিডব্যাক বক্সের স্টাইল সরাসরি ইনলাইন করে দেওয়া হয়েছে
                    let fbBorder = fb.className.includes('correct') ? '#16a34a' : '#d53f3f';
                    let fbBG = fb.className.includes('correct') ? '#f0fff4' : '#fff5f5';

                    content += `
            <div style="margin-top: 15px; padding: 10px; border-left: 5px solid ${fbBorder}; background-color: ${fbBG};">
                ${fb.innerHTML
                            .replace(/<b>/g, '<strong>')
                            .replace(/<\/b>/g, '</strong>')
                            .replace(/class="ans-tag"/g, 'style="display:block; color:#2563eb; font-weight:bold; margin-top:5px;"')}
            </div>`;
                } else {
                    content += `<p style="color:#2563eb; font-style:italic;">Submit চাপলে ফিডব্যাক ও স্কোর দেখা যাবে।</p>`;
                }

                content += `</div>`;
            });

            content += `</body></html>`;

            // ফাইল ডাউনলোড প্রসেস
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `HSC_Changing_Sentences_Page_${currentPage + 1}.doc`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function cleanStr(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').replace(/[.,?!]/g, '').trim();
        }

        function scrollToTop() {
            document.querySelector('.container').scrollIntoView({ behavior: 'smooth', block: 'start' });
            // অথবা আরও উপরে যেতে চাইলে: window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function expandVariants(text) {

            let results = [text];

            while (results.some(t => /\b[\w'-]+\/[\w'-]+\b/.test(t))) {

                let newResults = [];

                results.forEach(str => {

                    const match = str.match(/\b([\w'-]+)\/([\w'-]+)\b/);

                    if (match) {

                        newResults.push(str.replace(match[0], match[1]));
                        newResults.push(str.replace(match[0], match[2]));

                    } else {

                        newResults.push(str);

                    }

                });

                results = newResults;
            }

            return [...new Set(results.map(r => r.trim()))];
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Fill both boxes!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((block, idx) => {
                let sentences = [];
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";

                const introPart = block.split(/\([a-e]\)/)[0].trim();

                const qRegex = /\(([a-e])\)\s*([\s\S]*?)(?=\([a-e]\)|$)/g;
                let qMatch;
                while ((qMatch = qRegex.exec(block)) !== null) {
                    sentences.push({ letter: qMatch[1], text: qMatch[2].trim() });
                }

                const aRegex = /\(([a-e])\)\s*([\s\S]*?)(?=\([a-e]\)|$)/g;
                let aMatch;
                while ((aMatch = aRegex.exec(rawAns)) !== null) {
                    const fullText = aMatch[2].trim();
                    // const options = fullText.split(/\s+Or,\s+|\s+or\s+|;/gi).map(o => o.trim());
                    let options = fullText
                        .split(/\s+Or,\s+|\s+or\s+|;/gi)
                        .map(o => o.trim());

                    let expanded = [];

                    options.forEach(opt => {
                        expanded.push(...expandVariants(opt));
                    });

                    options = expanded;

                    ansMap[aMatch[1]] = {
                        original: fullText,
                        options: options
                    };
                }

                return { intro: introPart, sentences, answers: ansMap, score: null };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderPage(0);
        }

        function renderPage(page) {
            currentPage = page;
            const totalPages = Math.ceil(quizData.length / setsPerPage);
            const start = page * setsPerPage;
            const end = Math.min(start + setsPerPage, quizData.length);

            document.getElementById('page-info').textContent =
                `Page ${page + 1} of ${totalPages}  |  Total Sets: ${quizData.length}`;

            document.getElementById('quiz-container').innerHTML = quizData.slice(start, end).map((set, localIdx) => {
                const globalIdx = start + localIdx;
                return `
                    <div class="quiz-card">
                        <h3 style="margin-top:0">Practice Set ${globalIdx + 1}</h3>
                        <div class="intro-text">${set.intro}</div>
                        ${set.sentences.map(s => `
                            <div class="sentence-row">
                                <span class="q-text"><b>(${s.letter})</b> ${s.text}</span>
                                <input type="text" class="gap-input" data-letter="${s.letter}" data-set="${globalIdx}" autocomplete="off">
                            </div>
                        `).join('')}
                        <div id="fb-${globalIdx}" class="feedback-area"></div>
                    </div>
                `;
            }).join('');

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            prevBtn.disabled = page === 0;
            nextBtn.disabled = end >= quizData.length;
        }

        function prevPage() {
            if (currentPage > 0) {
                renderPage(currentPage - 1);
                scrollToTop();
            }
        }

        function nextPage() {
            if ((currentPage + 1) * setsPerPage < quizData.length) {
                renderPage(currentPage + 1);
                scrollToTop();
            }
        }

        function checkAnswers() {
            const start = currentPage * setsPerPage;
            const end = Math.min(start + setsPerPage, quizData.length);
            let pageTotalScore = 0;
            let pageTotalQuestions = 0;

            for (let setIdx = start; setIdx < end; setIdx++) {
                const set = quizData[setIdx];
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-set="${setIdx}"]`);
                let feedbackHTML = "<b>Correct Answers:</b><br>";

                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanStr(input.value);
                    const ansData = set.answers[letter];

                    if (ansData) {
                        // const isCorrect = userVal !== "" && ansData.options.some(opt => cleanStr(opt) === userVal);
                        const isCorrect = userVal !== "" && ansData.options.some(opt => {
                            const correct = cleanStr(opt);
                            return correct === userVal || similarity(correct, userVal) > 0.85;
                        });

                        if (isCorrect) {
                            input.style.color = "var(--s)";
                            input.classList.add('input-correct');
                            input.classList.remove('input-wrong');
                            score++;
                        } else {
                            input.style.color = "var(--d)";
                            input.classList.add('input-wrong');
                            input.classList.remove('input-correct');
                        }
                        feedbackHTML += `<span class="ans-tag"><b>(${letter})</b> ${ansData.original}</span>`;
                    }
                });

                // save score for this set
                set.score = score;

                const fb = document.getElementById(`fb-${setIdx}`);
                fb.style.display = "block";
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br>${feedbackHTML}`;

                pageTotalScore += score;
                pageTotalQuestions += inputs.length;
            }

            // show page summary
            const pageInfo = document.getElementById('page-info');
            pageInfo.innerHTML =
                `Page ${currentPage + 1} of ${Math.ceil(quizData.length / setsPerPage)}  |  ` +
                `Total Sets: ${quizData.length}  |  ` +
                `This Page Score: ${pageTotalScore} / ${pageTotalQuestions}`;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function similarity(a, b) {

            const matrix = [];

            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }

            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }

            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {

                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }

                }
            }

            const distance = matrix[b.length][a.length];
            const maxLen = Math.max(a.length, b.length);

            return 1 - distance / maxLen;
        }
