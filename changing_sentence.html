<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Transformation Master - Color Print</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #b91c1c;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --input-bg: #fffbeb;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
            --input-bg: #334155;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            transition: 0.3s;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 350px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-family: inherit;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .sentence-row {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }

        .q-text {
            font-weight: 500;
            margin-bottom: 8px;
            display: block;
        }

        .gap-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--p);
            background: var(--input-bg);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            padding: 8px;
            box-sizing: border-box;
            border-radius: 4px 4px 0 0;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .correct-box {
            background: rgba(22, 163, 74, 0.1);
            border-left: 6px solid var(--s);
        }

        .wrong-box {
            background: rgba(220, 38, 38, 0.1);
            border-left: 6px solid var(--d);
        }

        .ans-tag {
            display: block;
            background: #f0f7ff;
            border: 1px solid var(--p);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 0.95em;
            color: var(--p);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        /* --- COLOR PRINT OPTIMIZATION --- */
        @media print {
            @page {
                margin: 1cm;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body {
                background: white !important;
                padding: 0 !important;
            }

            .no-print,
            .theme-toggle {
                display: none !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .quiz-card {
                border: 2px solid #2563eb !important;
                /* Blue Border in Print */
                margin-bottom: 20px !important;
                padding: 15px !important;
                page-break-inside: avoid;
                border-radius: 10px !important;
            }

            h2 {
                color: #2563eb !important;
                text-align: center !important;
            }

            h3 {
                color: #9333ea !important;
            }

            .q-text {
                color: #1e293b !important;
            }

            .gap-input {
                border-bottom: 2px solid #2563eb !important;
                background: transparent !important;
            }

            .feedback-area {
                display: block !important;
                border-left: 5px solid #16a34a !important;
                background: #f0fdf4 !important;
                /* Light green background */
                padding: 10px !important;
            }

            .ans-tag {
                border: 1px solid #2563eb !important;
                color: #2563eb !important;
                background: #f0f7ff !important;
                /* Light blue background */
                margin-top: 5px !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center;">HSC Sentence Transformation (Color-Print Edition)</h2>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <textarea id="q-input" placeholder="Paste Questions..."></textarea>
                <textarea id="a-input" placeholder="Paste Answers..."></textarea>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Generate Sheet</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Check Answers</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Print in Color</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }
        function cleanStr(str) {
            return str.toLowerCase().replace(/\s+/g, ' ').replace(/[.,?!]/g, '').trim();
        }
        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Fill both boxes!");

            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());

            quizData = qBlocks.map((block, idx) => {
                let sentences = [];
                let ansMap = {};
                let rawAns = aBlocks[idx] || "";

                const qRegex = /\(([a-e])\)\s*([\s\S]*?)(?=\([a-e]\)|$)/g;
                let qMatch;
                while ((qMatch = qRegex.exec(block)) !== null) {
                    sentences.push({ letter: qMatch[1], text: qMatch[2].trim() });
                }

                const aRegex = /\(([a-e])\)\s*([\s\S]*?)(?=\([a-e]\)|$)/g;
                let aMatch;
                while ((aMatch = aRegex.exec(rawAns)) !== null) {
                    ansMap[aMatch[1]] = aMatch[2].trim().replace(/;$/, '');
                }

                return { sentences, answers: ansMap };
            });

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            document.getElementById('quiz-container').innerHTML = quizData.map((set, i) => `
                <div class="quiz-card">
                    <h3 style="margin-top:0">Practice Set ${i + 1}</h3>
                    ${set.sentences.map(s => `
                        <div class="sentence-row">
                            <span class="q-text"><b>(${s.letter})</b> ${s.text}</span>
                            <input type="text" class="gap-input" data-letter="${s.letter}" data-set="${i}" autocomplete="off">
                        </div>
                    `).join('')}
                    <div id="fb-${i}" class="feedback-area"></div>
                </div>
            `).join('');
        }

        function checkAnswers() {
            quizData.forEach((set, setIdx) => {
                let score = 0;
                const inputs = document.querySelectorAll(`.gap-input[data-set="${setIdx}"]`);
                let feedbackHTML = "<b>Correct Answers:</b><br>";

                inputs.forEach(input => {
                    const letter = input.dataset.letter;
                    const userVal = cleanStr(input.value);
                    const official = set.answers[letter] || "";
                    const possible = official.split(/[/;]|\sor\s/).map(o => cleanStr(o));

                    const isCorrect = userVal !== "" && possible.some(p => p === userVal);
                    input.style.color = isCorrect ? "var(--s)" : "var(--d)";
                    if (isCorrect) score++;
                    feedbackHTML += `<span class="ans-tag"><b>(${letter})</b> ${official}</span>`;
                });

                const fb = document.getElementById(`fb-${setIdx}`);
                fb.style.display = "block";
                fb.innerHTML = `<b>Score: ${score} / ${inputs.length}</b><br>${feedbackHTML}`;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
