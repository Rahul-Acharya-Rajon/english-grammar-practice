<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Pronoun Reference - Print Optimized</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #b91c1c;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --hl: #fef08a;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            transition: background 0.3s;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 15px;
                border-radius: 8px;
            }

            .setup-grid {
                grid-template-columns: 1fr !important;
            }

            textarea,
            .user-input-box {
                height: 180px;
                font-size: 14px;
            }

            .btn {
                width: 100%;
                margin: 5px 0;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-size: 15px;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .q-display {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-style: italic;
            border-left: 4px solid var(--p);
            white-space: pre-wrap;
            color: #1e293b;
        }

        [data-theme="dark"] .q-display {
            background: #334155;
            color: #f1f5f9;
        }

        .user-input-box {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-main);
            font-family: inherit;
            font-size: 16px;
            line-height: 1.7;
            outline: none;
            box-sizing: border-box;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .diff-view {
            background: var(--card-bg);
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 5px;
            color: var(--text-main);
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .correct-line {
            color: var(--s);
            font-weight: 500;
            display: block;
            border-left: 3px solid var(--s);
            padding-left: 8px;
            margin-bottom: 2px;
        }

        .wrong-line {
            color: var(--d);
            font-weight: 500;
            display: block;
            border-left: 3px solid var(--d);
            padding-left: 8px;
        }

        .actual-hint {
            color: var(--p);
            font-style: italic;
            font-size: 0.85em;
            display: block;
            margin-bottom: 10px;
            margin-left: 15px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        .hidden {
            display: none !important;
        }

        .pagination {
            text-align: center;
            margin-top: 20px;
        }

        .score-display {
            margin: 16px 0;
            padding: 12px;
            background: rgba(22, 163, 74, 0.1);
            border-radius: 8px;
            font-weight: bold;
            color: var(--s);
            text-align: center;
            border: 1px solid var(--s);
        }

        /* --- ENHANCED PRINT OPTIMIZATION --- */
        @media print {
            @page {
                margin: 0.5cm;
            }

            body {
                background: var(--bg) !important;
                color: var(--text-main) !important;
                padding: 0 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .no-print,
            .theme-toggle,
            .user-input-box,
            .btn,
            h2 {
                display: none !important;
            }

            .container {
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                background: transparent !important;
            }

            .quiz-card {
                border: 1px solid var(--p) !important;
                margin-bottom: 10px !important;
                padding: 12px !important;
                page-break-inside: avoid;
                border-radius: 8px !important;
                background: var(--card-bg) !important;
            }

            .q-display {
                margin-bottom: 8px !important;
                padding: 10px !important;
                font-size: 14px !important;
                background: #f1f5f9 !important;
                border-left: 4px solid var(--p) !important;
            }

            [data-theme="dark"] .q-display {
                background: #334155 !important;
            }

            .feedback-area {
                display: block !important;
                margin-top: 5px !important;
                padding: 0 !important;
            }

            .diff-view {
                border: none !important;
                padding: 0 !important;
                background: transparent !important;
                font-size: 14px !important;
            }

            h3 {
                margin: 0 0 5px 0 !important;
                font-size: 1.1em !important;
                color: var(--p) !important;
            }

            h4 {
                margin: 5px 0 !important;
                font-size: 1em !important;
            }

            .actual-hint {
                margin-bottom: 8px !important;
            }

            .score-display {
                border: 1px solid #16a34a !important;
                background: #f0fdf4 !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color:var(--p);" class="no-print">Pronoun Reference</h2>

        <div id="setup-view" class="no-print">
            <p>Enter Questions & Answers</p>
            <div class="setup-grid">
                <textarea id="q-input" placeholder="Question passage..."></textarea>
                <textarea id="a-input" placeholder="Corrected passage..."></textarea>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Start Practice</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Verify Rewrite</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Print</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
            <div id="pagination" class="pagination no-print"></div>
            <div id="score-display" class="score-display hidden"></div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentPage = 0;
        const itemsPerPage = 10;

        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }

        function clean(str) {
            return str.toLowerCase().replace(/[.,!?;:()]/g, "").replace(/\s+/g, " ").trim();
        }

        function splitBySentence(text) {
            return text.split(/(?<=[.!?])\s+(?=[A-Z"])/).map(s => s.trim()).filter(s => s.length > 0);
        }

        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Please fill both boxes!");
            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            quizData = qBlocks.map((qText, idx) => {
                let cleanQ = qText.replace(/^\d+\.\s*/, "").trim();
                let cleanA = (aBlocks[idx] || "").replace(/^\d+\.\s*/, "").trim();
                return { original: cleanQ, corrected: cleanA };
            });
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderPage(currentPage);
        }

        function renderPage(page) {
            const start = page * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = quizData.slice(start, end);
            document.getElementById('quiz-container').innerHTML = pageData.map((item, i) => `
                <div class="quiz-card">
                    <h3>Practice Set ${start + i + 1}</h3>
                    <div class="q-display"><strong>Original:</strong><br>${item.original}</div>
                    <textarea class="user-input-box no-print" data-idx="${start + i}" placeholder="Type full rewrite here..."></textarea>
                    <div id="fb-${start + i}" class="feedback-area"></div>
                </div>
            `).join('');
            renderPagination();
            document.getElementById('score-display').classList.add('hidden');
            // Auto scroll to top smoothly when page changes
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderPagination() {
            const totalPages = Math.ceil(quizData.length / itemsPerPage);
            let paginationHTML = '';
            if (currentPage > 0) {
                paginationHTML += `<button class="btn" style="background:var(--p)" onclick="changePage(${currentPage - 1})">Previous</button>`;
            }
            paginationHTML += ` Page ${currentPage + 1} of ${totalPages} `;
            if (currentPage < totalPages - 1) {
                paginationHTML += `<button class="btn" style="background:var(--p)" onclick="changePage(${currentPage + 1})">Next</button>`;
            }
            document.getElementById('pagination').innerHTML = paginationHTML;
        }

        function changePage(page) {
            currentPage = page;
            renderPage(currentPage);
        }

        function checkAnswers() {
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            let totalCorrect = 0;
            let totalQuestions = 0;
            for (let globalIdx = start; globalIdx < end && globalIdx < quizData.length; globalIdx++) {
                const item = quizData[globalIdx];
                const userText = document.querySelector(`.user-input-box[data-idx="${globalIdx}"]`)?.value?.trim() || "";
                if (!userText) continue;
                const userLines = splitBySentence(userText);
                const correctLines = splitBySentence(item.corrected);
                const fb = document.getElementById(`fb-${globalIdx}`);
                let reportHTML = "<h4>Correction Report:</h4><div class='diff-view'>";
                const maxLines = Math.max(userLines.length, correctLines.length);
                let correctCount = 0;
                for (let idx = 0; idx < maxLines; idx++) {
                    let uL = userLines[idx] || "";
                    let cL = correctLines[idx] || "";
                    if (cL && uL && clean(uL) === clean(cL)) {
                        reportHTML += `<span class="correct-line">✓ ${uL}</span>`;
                        correctCount++;
                    } else if (cL) {
                        reportHTML += `<span class="wrong-line">✗ ${uL || "[Missing Line]"}</span>`;
                        reportHTML += `<span class="actual-hint">➜ Correct: ${cL}</span>`;
                    }
                }
                totalCorrect += correctCount;
                totalQuestions += correctLines.length;
                reportHTML += "</div>";
                fb.style.display = "block";
                fb.innerHTML = reportHTML;
            }
            const score = totalQuestions > 0 ? Math.round((totalCorrect / totalQuestions) * 100) : 0;
            const scoreDisplay = document.getElementById('score-display');
            scoreDisplay.innerHTML = `This Page Score: ${score}% <br>(${totalCorrect} correct out of ${totalQuestions} sentences)`;
            scoreDisplay.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
