<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC Pronoun Reference - Print Optimized</title>
    <style>
        :root {
            --p: #2563eb;
            --s: #16a34a;
            --d: #b91c1c;
            --bg: #f8fafc;
            --card-bg: white;
            --text-main: #1e293b;
            --border: #cbd5e1;
            --hl: #fef08a;
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --border: #475569;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            padding: 20px;
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .setup-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-main);
            resize: vertical;
            box-sizing: border-box;
            font-size: 15px;
        }

        .quiz-card {
            border: 2px solid var(--p);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 15px;
            background: var(--card-bg);
        }

        .q-display {
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-style: italic;
            border-left: 4px solid var(--p);
            white-space: pre-wrap;
        }

        .user-input-box {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.7;
            outline: none;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            margin: 5px;
            font-size: 15px;
        }

        .feedback-area {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .diff-view {
            background: #fff;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 5px;
            color: #000;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        .correct-line {
            color: var(--s);
            font-weight: 500;
            display: block;
            border-left: 3px solid var(--s);
            padding-left: 8px;
            margin-bottom: 2px;
        }

        .wrong-line {
            color: var(--d);
            font-weight: 500;
            display: block;
            border-left: 3px solid var(--d);
            padding-left: 8px;
        }

        .actual-hint {
            color: #2563eb;
            font-style: italic;
            font-size: 0.85em;
            display: block;
            margin-bottom: 10px;
            margin-left: 15px;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--p);
            color: white;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1000;
        }

        /* --- EXTRA SPACE REMOVAL FOR PRINT --- */
        @media print {
            @page {
                margin: 0.5cm;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .no-print,
            .theme-toggle,
            .user-input-box,
            .btn,
            h2 {
                display: none !important;
            }

            .container {
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
            }

            .quiz-card {
                border: 1px solid #2563eb !important;
                margin-bottom: 10px !important;
                padding: 10px !important;
                page-break-inside: avoid;
                border-radius: 5px !important;
            }

            .q-display {
                margin-bottom: 5px !important;
                padding: 8px !important;
                font-size: 0.9em !important;
                background: #f8fafc !important;
            }

            .feedback-area {
                display: block !important;
                margin-top: 5px !important;
                padding: 5px !important;
            }

            .diff-view {
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            h3 {
                margin: 0 0 5px 0 !important;
                font-size: 1.1em !important;
                color: #2563eb !important;
            }

            h4 {
                margin: 5px 0 !important;
                font-size: 1em !important;
            }

            .actual-hint {
                margin-bottom: 5px !important;
            }
        }
    </style>
</head>

<body>
    <div class="theme-toggle no-print" onclick="toggleTheme()">🌓 Theme</div>
    <div class="container">
        <h2 style="text-align:center; color:var(--p);" class="no-print">Pronoun Reference - Color Print Ready</h2>

        <div id="setup-view" class="no-print">
            <div class="setup-grid">
                <textarea id="q-input" placeholder="Question passage..."></textarea>
                <textarea id="a-input" placeholder="Corrected passage..."></textarea>
            </div>
            <button class="btn" style="background:var(--p); width:100%" onclick="initApp()">Start Practice</button>
        </div>

        <div id="quiz-view" class="hidden">
            <div id="quiz-container"></div>
            <div style="text-align:center;" class="no-print">
                <button class="btn" style="background:var(--s)" onclick="checkAnswers()">Verify Rewrite</button>
                <button class="btn" style="background:#9333ea" onclick="window.print()">Print (No Extra Space)</button>
                <button class="btn" style="background:#64748b" onclick="location.reload()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let quizData = [];
        function toggleTheme() {
            document.documentElement.hasAttribute("data-theme") ? document.documentElement.removeAttribute("data-theme") : document.documentElement.setAttribute("data-theme", "dark");
        }
        function clean(str) {
            return str.toLowerCase().replace(/[.,!?;:()]/g, "").replace(/\s+/g, " ").trim();
        }
        function splitBySentence(text) {
            return text.split(/(?<=[.!?])\s+(?=[A-Z"])/).map(s => s.trim()).filter(s => s.length > 0);
        }
        function initApp() {
            const qIn = document.getElementById('q-input').value.trim();
            const aIn = document.getElementById('a-input').value.trim();
            if (!qIn || !aIn) return alert("Please fill both boxes!");
            const qBlocks = qIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            const aBlocks = aIn.split(/\n\s*(?=\d+\.)/).filter(b => b.trim());
            quizData = qBlocks.map((qText, idx) => {
                let cleanQ = qText.replace(/^\d+\.\s*/, "").trim();
                let cleanA = (aBlocks[idx] || "").replace(/^\d+\.\s*/, "").trim();
                return { original: cleanQ, corrected: cleanA };
            });
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            document.getElementById('quiz-container').innerHTML = quizData.map((item, i) => `
                <div class="quiz-card">
                    <h3>Practice Set ${i + 1}</h3>
                    <div class="q-display"><strong>Original:</strong><br>${item.original}</div>
                    <textarea class="user-input-box no-print" data-idx="${i}" placeholder="Type full rewrite here..."></textarea>
                    <div id="fb-${i}" class="feedback-area"></div>
                </div>
            `).join('');
        }
        function checkAnswers() {
            quizData.forEach((item, i) => {
                const userText = document.querySelector(`.user-input-box[data-idx="${i}"]`).value.trim();
                if (!userText) return;
                const userLines = splitBySentence(userText);
                const correctLines = splitBySentence(item.corrected);
                const fb = document.getElementById(`fb-${i}`);
                let reportHTML = "<h4>Correction Report:</h4><div class='diff-view'>";
                const maxLines = Math.max(userLines.length, correctLines.length);
                for (let idx = 0; idx < maxLines; idx++) {
                    let uL = userLines[idx] || "";
                    let cL = correctLines[idx] || "";
                    if (cL && uL && clean(uL) === clean(cL)) {
                        reportHTML += `<span class="correct-line">✓ ${uL}</span>`;
                    } else if (cL) {
                        reportHTML += `<span class="wrong-line">✗ ${uL || "[Missing Line]"}</span>`;
                        reportHTML += `<span class="actual-hint">➜ Correct: ${cL}</span>`;
                    }
                }
                reportHTML += "</div>";
                fb.style.display = "block";
                fb.innerHTML = reportHTML;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>

</html>
